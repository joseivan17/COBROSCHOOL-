<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuentas Críticas por Cobrar</title>
<meta name="description" content="Sistema de gestión de cuentas críticas por cobrar: dashboard con semáforo de mora, importación desde Excel/CSV, abonos con fecha, roles y permisos.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f2138'/%3E%3Ctext x='50' y='66' font-family='monospace' font-weight='700' font-size='42' fill='%230e7c7b' text-anchor='middle'%3ECC%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0f2138;
  --navy-2:#16324f;
  --navy-3:#1e3f63;
  --paper:#f2f5f9;
  --card:#ffffff;
  --ink:#1b2733;
  --muted:#66748a;
  --line:#e1e6ee;
  --accent:#0e7c7b;
  --accent-dark:#0a5f5e;
  --accent-light:#e3f3f2;
  --verde:#2e7d32; --verde-bg:#e8f5e9;
  --amarillo:#b8860b; --amarillo-bg:#fff6d9;
  --naranja:#c15a0e; --naranja-bg:#ffe9d9;
  --rojo:#c62828; --rojo-bg:#fdebea;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
}
*{box-sizing:border-box;}
body{margin:0;font-family:var(--font-ui);background:var(--paper);color:var(--ink);font-size:14px;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:#cbd3e0;border-radius:6px;}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{background:var(--navy);color:#cdd9e6;padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px 20px 6px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px;}
.brand-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:#fff;font-size:15px;flex:none;}
.brand-text .t1{font-weight:700;color:#fff;font-size:13.5px;line-height:1.25;}
.brand-text .t2{font-size:11px;color:#8fa3ba;}
nav.navlist{display:flex;flex-direction:column;gap:2px;}
.navlink{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#b9c6d6;text-decoration:none;font-size:13.5px;cursor:pointer;border:none;background:none;text-align:left;width:100%;font-family:var(--font-ui);}
.navlink:hover{background:rgba(255,255,255,.06);color:#fff;}
.navlink.active{background:var(--accent);color:#fff;font-weight:600;}
.navlink .ic{width:18px;text-align:center;font-family:var(--font-mono);font-size:12px;opacity:.85;}
.navlink[disabled]{opacity:.35;cursor:not-allowed;pointer-events:none;}
.nav-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#6d84a0;margin:18px 8px 6px;}

.main{padding:22px 30px 60px;max-width:1400px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.pagehead h1{font-size:21px;margin:0 0 3px;letter-spacing:-.01em;}
.pagehead p{margin:0;color:var(--muted);font-size:13px;}
.session-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);padding:8px 12px;border-radius:10px;}
.session-box select, .session-box input{border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-family:var(--font-ui);font-size:12.5px;background:#fff;}
.role-pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:20px;}
.role-admin{background:#f0e6ff;color:#6a2fb5;}
.role-contable{background:var(--accent-light);color:var(--accent-dark);}
.role-auxiliar{background:#eef1f6;color:#57657a;}
.storage-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:default;}
.storage-badge.cloud{background:var(--accent-light);color:var(--accent-dark);}
.storage-badge.local{background:var(--amarillo-bg);color:var(--amarillo);}
.storage-badge.memory{background:var(--rojo-bg);color:var(--rojo);}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;}
.card h2{font-size:15px;margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.card h2 .n{font-family:var(--font-mono);color:var(--accent);font-size:12px;}
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:1fr 1fr;}
@media(max-width:1000px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:1fr 1fr;}}

.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.stat .value{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--navy);}
.stat .sub{font-size:11.5px;color:var(--muted);margin-top:4px;}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.b-verde{background:var(--verde-bg);color:var(--verde);}
.b-amarillo{background:var(--amarillo-bg);color:var(--amarillo);}
.b-naranja{background:var(--naranja-bg);color:var(--naranja);}
.b-rojo{background:var(--rojo-bg);color:var(--rojo);}
.dot-verde{background:var(--verde);} .dot-amarillo{background:var(--amarillo);} .dot-naranja{background:var(--naranja);} .dot-rojo{background:var(--rojo);}

table{width:100%;border-collapse:collapse;font-size:12.8px;}
th{position:sticky;top:0;background:var(--navy);color:#fff;text-align:left;padding:9px 10px;font-size:11.3px;text-transform:uppercase;letter-spacing:.03em;z-index:2;}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:hover td{background:#f7fafc;}
.tablewrap{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:10px;}
.mono{font-family:var(--font-mono);}
.tfoot-row td{font-weight:700;background:#eef2f7;position:sticky;bottom:0;}

.btn{font-family:var(--font-ui);border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:8px;font-size:12.8px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{border-color:#c3ccd8;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--accent-dark);}
.btn-sm{padding:5px 10px;font-size:11.8px;border-radius:6px;}
.btn-danger{color:var(--rojo);}
.btn[disabled]{opacity:.4;cursor:not-allowed;}

.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin-bottom:14px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.field select, .field input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-family:var(--font-ui);font-size:12.8px;background:#fff;min-width:130px;}
.searchbar{flex:1;min-width:220px;}
.searchbar input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--line);font-size:13px;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent-dark);border-bottom-color:var(--accent);}

.dropzone{border:2px dashed var(--line);border-radius:12px;padding:30px;text-align:center;color:var(--muted);background:#fbfcfe;cursor:pointer;}
.dropzone:hover{border-color:var(--accent);color:var(--accent-dark);}
.dropzone input{display:none;}

.pill-warn{background:var(--amarillo-bg);color:var(--amarillo);border-radius:6px;padding:2px 7px;font-size:10.8px;font-weight:700;}
.pill-error{background:var(--rojo-bg);color:var(--rojo);border-radius:6px;padding:2px 7px;font-size:10.8px;font-weight:700;}
.pill-ok{background:var(--verde-bg);color:var(--verde);border-radius:6px;padding:2px 7px;font-size:10.8px;font-weight:700;}

.modal-bg{position:fixed;inset:0;background:rgba(15,33,56,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:#fff;border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow:auto;padding:24px;}
.modal h3{margin:0 0 4px;font-size:16px;}
.modal .close{position:absolute;}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
.formgrid .full{grid-column:1/-1;}
.formgrid label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;}
.formgrid select, .formgrid input, .formgrid textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--font-ui);font-size:13px;}
.formgrid textarea{resize:vertical;min-height:60px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}

.timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:20px;}
.tl-item{position:relative;padding-bottom:20px;}
.tl-item::before{content:'';position:absolute;left:-26px;top:3px;width:10px;height:10px;border-radius:50%;background:var(--accent);}
.tl-date{font-family:var(--font-mono);font-size:11.5px;color:var(--muted);}
.tl-body{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:4px;}

.chart-bars{display:flex;align-items:flex-end;gap:14px;height:160px;padding-top:10px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;}
.chart-bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;}
.chart-label{font-size:11px;color:var(--muted);text-align:center;}
.chart-val{font-family:var(--font-mono);font-size:12px;font-weight:700;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .big{font-size:32px;margin-bottom:10px;}
.note{background:var(--accent-light);border:1px solid #bfe3e1;color:var(--accent-dark);border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:16px;}
.alertbox{background:var(--rojo-bg);border:1px solid #f3c6c3;color:#8f231f;border-radius:10px;padding:10px 14px;font-size:12.8px;margin-bottom:14px;}
.linklike{color:var(--accent-dark);cursor:pointer;font-weight:600;text-decoration:underline;}
.small{font-size:11.5px;color:var(--muted);}
.catlist{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.cattag{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;display:flex;align-items:center;gap:8px;}
.cattag button{border:none;background:none;color:var(--rojo);cursor:pointer;font-weight:700;font-size:13px;}
.addrow{display:flex;gap:8px;margin-top:12px;}
.addrow input{flex:1;padding:7px 10px;border:1px solid var(--line);border-radius:8px;}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0;}

/* ---------- login ---------- */
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),var(--navy-3));display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.login-card{background:#fff;border-radius:16px;padding:34px 34px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.login-brand .brand-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:#fff;font-size:16px;}
.login-brand div div:first-child{font-weight:700;font-size:15px;color:var(--navy);}
.login-brand div div:last-child{font-size:11.5px;color:var(--muted);}
.login-card h2{font-size:17px;margin:0 0 4px;}
.login-card p.sub{font-size:12.5px;color:var(--muted);margin:0 0 20px;}
.login-field{margin-bottom:14px;}
.login-field label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
.login-field input, .login-field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:var(--font-ui);font-size:13.5px;}
.login-error{background:var(--rojo-bg);color:var(--rojo);border-radius:8px;padding:8px 12px;font-size:12.3px;margin-bottom:14px;}
.login-ok{background:var(--verde-bg);color:var(--verde);border-radius:8px;padding:8px 12px;font-size:12.3px;margin-bottom:14px;}
.login-actions{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.login-actions .btn{width:100%;justify-content:center;padding:10px;font-size:13px;}
.login-link{text-align:center;font-size:12.3px;color:var(--accent-dark);cursor:pointer;font-weight:600;margin-top:6px;}
.login-back{font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:14px;display:inline-block;}
.login-note{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:11.5px;color:var(--muted);margin-top:16px;}
</style>
</head>
<body>
<div id="loginScreen"></div>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">CC</div>
      <div class="brand-text">
        <div class="t1">Cuentas Críticas</div>
        <div class="t2">Gestión de Cobros — Dirección</div>
      </div>
    </div>
    <nav class="navlist" id="navlist"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="pagehead">
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub">Panel general de cuentas críticas</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span id="storageBadge" class="storage-badge" title="Dónde se están guardando tus datos"></span>
        <div class="session-box">
          <span class="small">Sesión:</span>
          <span id="sessionUserLabel" style="font-weight:600;font-size:12.8px;">—</span>
          <span id="rolePill" class="role-pill role-admin">Administrador</span>
          <button class="btn btn-sm" id="logoutBtn">Cerrar sesión</button>
        </div>
      </div>
    </div>
    <div id="view"></div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
/* =========================================================================
   ESTADO Y PERSISTENCIA
   ========================================================================= */
const DB = {
  familias: [], estudiantes: [], actividades: [], estudianteActividades: [],
  cuentas: [], seguimientos: [], usuarios: [], abonos: [], auditoria: [],
  catalogos: {
    niveles: ["Nivel Inicial","Nivel Primario","Nivel Secundario"],
    grados: ["1er Grado A","1er Grado B","2do Grado A","3er Grado A","1er Año A","1er Año B","2do Año A"],
    actividades: [{nombre:"Fútbol",costo:1500},{nombre:"Música",costo:1200},{nombre:"Robótica",costo:2500},{nombre:"Transporte",costo:3000},{nombre:"Natación",costo:1800},{nombre:"Inglés",costo:1500}],
    estadosCuenta: ["Pendiente","Contactado","Compromiso de pago","Pago parcial","Regularizado","Sin respuesta"],
    mediosContacto: ["Llamada","WhatsApp","Correo","Reunión","Visita"],
    resultadosGestion: ["No respondió","Promesa de pago","Pagó","Reprogramó","Número incorrecto","Pendiente"],
    responsables: ["Ana Gómez","Luis Familia","Dirección"]
  }
};
let STORAGE_OK = true;
// 'checking' -> 'cloud' (Claude.ai) -> 'indexeddb' -> 'local' (localStorage) -> 'memory'
let STORAGE_MODE = 'checking';
let STORAGE_DIAG = { protocolo:'', supabaseIntentado:false, supabaseFunciona:false, cloudIntentado:false, cloudFunciona:false, idbIntentado:false, idbFunciona:false, localIntentado:false, localFunciona:false, detalle:'' };
let MEMORY_STORE = {}; // último recurso: sobrevive mientras la pestaña esté abierta, se pierde al recargar
// Conexión de fábrica: cada dispositivo que abra esta copia de la app se conecta automáticamente
// a este proyecto de Supabase, sin que nadie tenga que configurarlo a mano. La anon key está
// diseñada por Supabase para ser pública (se protege con las reglas de seguridad del proyecto,
// no ocultándola) — por eso es seguro incluirla directamente aquí.
const SUPABASE_DEFAULT_URL = 'https://rpxjysxherdvfmfmqqjr.supabase.co';
const SUPABASE_DEFAULT_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJweGp5c3hoZXJkdmZtZm1xcWpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDg4NjcsImV4cCI6MjA5OTUyNDg2N30.SmseoiVK6eZuS5b0F6w-PkJLBHQ2pImCFqTDas0G2BE';
let SUPABASE_URL = null;
let SUPABASE_ANON_KEY = null;

async function cargarConfigSupabase(){
  let cfg = null;
  try{ cfg = await idbGet('ccc:supabase_config'); }catch(e){ /* IndexedDB puede no estar lista aún */ }
  if (!cfg){
    try{ const raw = localStorage.getItem('ccc_local:ccc:supabase_config'); if (raw) cfg = JSON.parse(raw); }catch(e){}
  }
  if (cfg && cfg.url && cfg.key){ SUPABASE_URL = cfg.url; SUPABASE_ANON_KEY = cfg.key; }
  else if (cfg && cfg.desconectadoManualmente){ SUPABASE_URL = null; SUPABASE_ANON_KEY = null; }
  else if (SUPABASE_DEFAULT_URL && SUPABASE_DEFAULT_KEY){ SUPABASE_URL = SUPABASE_DEFAULT_URL; SUPABASE_ANON_KEY = SUPABASE_DEFAULT_KEY; }
}
// Acepta el Project URL tal cual lo copien, incluso si pegaron de más (ej. ".../rest/v1/" al final,
// que es común porque así aparece en algunas pantallas de la documentación de Supabase).
function normalizarSupabaseUrl(url){
  let u = String(url||'').trim();
  u = u.replace(/\/rest\/v1\/?$/i, '');
  u = u.replace(/\/+$/,'');
  return u;
}
async function guardarConfigSupabase(url, key){
  const cfg = { url: normalizarSupabaseUrl(url), key: String(key||'').trim() };
  try{ await idbSet('ccc:supabase_config', cfg); }catch(e){}
  try{ localStorage.setItem('ccc_local:ccc:supabase_config', JSON.stringify(cfg)); }catch(e){}
  SUPABASE_URL = cfg.url; SUPABASE_ANON_KEY = cfg.key;
}
async function borrarConfigSupabase(){
  SUPABASE_URL = null; SUPABASE_ANON_KEY = null;
  // Se guarda un marcador de "desconectado a propósito" (en vez de simplemente borrar la llave)
  // para que este dispositivo no vuelva a conectarse solo al proyecto de fábrica en el próximo uso.
  const marcador = { url:null, key:null, desconectadoManualmente:true };
  try{ await idbSet('ccc:supabase_config', marcador); }catch(e){}
  try{ localStorage.setItem('ccc_local:ccc:supabase_config', JSON.stringify(marcador)); }catch(e){}
}

/* ---------- Supabase: se habla por REST puro (fetch), sin librería externa,
   para no depender de un CDN fuera de lo permitido en este entorno. ---------- */
// Tiempo máximo de espera para cualquier llamada a Supabase. Sin esto, una red lenta o que
// bloquee la conexión en silencio podía dejar el arranque de la app esperando indefinidamente.
const SUPABASE_TIMEOUT_MS = 7000;
function fetchConTimeout(url, options){
  const controller = new AbortController();
  const timer = setTimeout(()=> controller.abort(), SUPABASE_TIMEOUT_MS);
  return fetch(url, { ...(options||{}), signal: controller.signal }).finally(()=> clearTimeout(timer));
}
async function supabaseFetch(path, options){
  options = options || {};
  return fetchConTimeout(SUPABASE_URL + path, {
    ...options,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      ...(options.headers||{})
    }
  });
}
async function supabaseProbar(url, key){
  const base = normalizarSupabaseUrl(url);
  if (!base || !key) return { ok:false, error:'Complete el Project URL y la anon key.' };
  try{
    const res = await fetchConTimeout(base + '/rest/v1/kv_store?limit=1', { headers: { apikey:key, Authorization:'Bearer '+key } });
    if (res.status === 200) return { ok:true };
    if (res.status === 404 || res.status === 400) return { ok:false, error:'No se encontró la tabla "kv_store". Verifique que ejecutó el script SQL en su proyecto de Supabase (ver ARQUITECTURA_Y_ESCALABILIDAD.md).' };
    if (res.status === 401 || res.status === 403) return { ok:false, error:'Credenciales rechazadas (código '+res.status+'). Verifique el Project URL y la anon key.' };
    return { ok:false, error:'Respuesta inesperada del servidor (código ' + res.status + ').' };
  }catch(e){
    const motivo = (e && e.name === 'AbortError') ? `Se agotó el tiempo de espera (${SUPABASE_TIMEOUT_MS/1000}s) intentando conectar.` : ('No se pudo conectar: ' + (e && e.message || e));
    return { ok:false, error:motivo };
  }
}
async function supabaseGet(key){
  const res = await supabaseFetch('/rest/v1/kv_store?key=eq.' + encodeURIComponent(key) + '&select=value', { method:'GET' });
  if (!res.ok) throw new Error('Supabase GET falló (código ' + res.status + ')');
  const rows = await res.json();
  return (rows && rows[0] && rows[0].value !== undefined) ? rows[0].value : null;
}
async function supabaseSet(key, value){
  const res = await supabaseFetch('/rest/v1/kv_store', {
    method: 'POST',
    headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
  if (!res.ok) throw new Error('Supabase SET falló (código ' + res.status + ')');
}

// Hash simple en JS puro (sin depender de crypto.subtle, que no siempre está
// disponible dentro del iframe de vista previa). No es criptográfico de grado
// bancario, pero evita guardar contraseñas en texto plano y funciona en cualquier entorno.
function hashText(text){
  text = String(text||'').trim().toLowerCase();
  let h1 = 0x811c9dc5, h2 = 5381;
  for (let i=0;i<text.length;i++){
    const c = text.charCodeAt(i);
    h1 = Math.imul(h1 ^ c, 16777619) >>> 0;
    h2 = ((h2 * 33) ^ c) >>> 0;
  }
  return h1.toString(16).padStart(8,'0') + h2.toString(16).padStart(8,'0') + text.length.toString(16);
}

function cloudStorageDisponible(){
  return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function' && typeof window.storage.set === 'function';
}

/* ---------- IndexedDB: almacenamiento local principal (mucha más capacidad y
   estructura que localStorage; asíncrono; pensado para que la app crezca con los años) ---------- */
const IDB_NAME = 'cccDB';
const IDB_STORE = 'kv';
let _idbInstance = null;
function idbOpen(){
  return new Promise((resolve, reject)=>{
    if (!('indexedDB' in window) || !window.indexedDB) { reject(new Error('IndexedDB no disponible en este navegador')); return; }
    let req;
    try{ req = window.indexedDB.open(IDB_NAME, 1); }catch(e){ reject(e); return; }
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error || new Error('No se pudo abrir IndexedDB'));
    req.onblocked = ()=> reject(new Error('Apertura de IndexedDB bloqueada'));
  });
}
async function idbGetInstance(){
  if (_idbInstance) return _idbInstance;
  _idbInstance = await idbOpen();
  return _idbInstance;
}
function idbGet(key){
  return idbGetInstance().then(db => new Promise((resolve, reject)=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readonly');
      const store = tx.objectStore(IDB_STORE);
      const req = store.get(key);
      req.onsuccess = ()=> resolve(req.result === undefined ? null : req.result);
      req.onerror = ()=> reject(req.error);
    }catch(e){ reject(e); }
  }));
}
function idbSet(key, value){
  return idbGetInstance().then(db => new Promise((resolve, reject)=>{
    try{
      const tx = db.transaction(IDB_STORE, 'readwrite');
      const store = tx.objectStore(IDB_STORE);
      const req = store.put(value, key);
      req.onsuccess = ()=> resolve(true);
      req.onerror = ()=> reject(req.error);
    }catch(e){ reject(e); }
  }));
}
async function migrarLocalStorageAIndexedDB(){
  try{
    const marker = await idbGet('ccc:__migrated_from_localstorage__');
    if (marker) return;
    const prefix = 'ccc_local:';
    for (let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if (k && k.indexOf(prefix)===0){
        const realKey = k.slice(prefix.length);
        const raw = localStorage.getItem(k);
        if (raw !== null){
          try{ await idbSet(realKey, JSON.parse(raw)); }catch(e){ /* fila corrupta, se ignora */ }
        }
      }
    }
    await idbSet('ccc:__migrated_from_localstorage__', true);
  }catch(e){ /* la migración es un plus, no debe romper el arranque */ }
}

// Prueba REAL de guardado en cada nivel: escribe un valor, lo vuelve a leer, y confirma
// que coincide. No basta con que la llamada no arroje error — en algunos navegadores
// (sobre todo con el archivo abierto como file://) el storage existe pero no persiste de verdad.
async function verificarAlmacenamiento(){
  STORAGE_DIAG.protocolo = (typeof location !== 'undefined' && location.protocol) ? location.protocol : 'desconocido';
  const testKey = 'ccc:__test__';
  const testVal = { t: Date.now(), r: Math.random().toString(36) };

  if (SUPABASE_URL && SUPABASE_ANON_KEY){
    STORAGE_DIAG.supabaseIntentado = true;
    try{
      await supabaseSet(testKey, testVal);
      const back = await supabaseGet(testKey);
      const ok = !!(back && back.r === testVal.r);
      STORAGE_DIAG.supabaseFunciona = ok;
      if (ok){ STORAGE_MODE = 'supabase'; return; }
    }catch(e){ STORAGE_DIAG.detalle = 'Supabase: ' + (e && e.message || e); }
  }

  if (cloudStorageDisponible()){
    STORAGE_DIAG.cloudIntentado = true;
    try{
      await window.storage.set(testKey, JSON.stringify(testVal), true);
      const r = await window.storage.get(testKey, true);
      const ok = !!(r && r.value && JSON.parse(r.value).r === testVal.r);
      STORAGE_DIAG.cloudFunciona = ok;
      if (ok){ STORAGE_MODE = 'cloud'; return; }
    }catch(e){ STORAGE_DIAG.detalle = 'Nube: ' + (e && e.message || e); }
  }

  STORAGE_DIAG.idbIntentado = true;
  try{
    await idbSet(testKey, testVal);
    const back = await idbGet(testKey);
    const ok = !!(back && back.r === testVal.r);
    STORAGE_DIAG.idbFunciona = ok;
    if (ok){
      STORAGE_MODE = 'indexeddb';
      await migrarLocalStorageAIndexedDB();
      return;
    }
  }catch(e){ STORAGE_DIAG.detalle = (STORAGE_DIAG.detalle?STORAGE_DIAG.detalle+' | ':'') + 'IndexedDB: ' + (e && e.message || e); }

  STORAGE_DIAG.localIntentado = true;
  try{
    localStorage.setItem('ccc_local:'+testKey, JSON.stringify(testVal));
    const raw = localStorage.getItem('ccc_local:'+testKey);
    const ok = !!(raw && JSON.parse(raw).r === testVal.r);
    localStorage.removeItem('ccc_local:'+testKey);
    STORAGE_DIAG.localFunciona = ok;
    if (ok){ STORAGE_MODE = 'local'; return; }
  }catch(e){ STORAGE_DIAG.detalle = (STORAGE_DIAG.detalle?STORAGE_DIAG.detalle+' | ':'') + 'Local: ' + (e && e.message || e); }

  STORAGE_MODE = 'memory';
}

async function dbGet(key, fallback){
  if (STORAGE_MODE === 'supabase'){
    try{
      const v = await supabaseGet(key);
      if (v !== null && v !== undefined) return v;
      return fallback;
    }catch(e){ /* seguimos abajo: probamos el espejo local */ }
  }
  if (STORAGE_MODE === 'cloud'){
    try{
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : fallback;
    }catch(e){ /* seguimos abajo por si acaso */ }
  }
  if (STORAGE_MODE === 'indexeddb' || STORAGE_MODE === 'cloud' || STORAGE_MODE === 'supabase'){
    try{
      const v = await idbGet(key);
      if (v !== null && v !== undefined) return v;
      if (STORAGE_MODE === 'indexeddb') return fallback;
    }catch(e){ /* seguimos abajo */ }
  }
  if (STORAGE_MODE === 'cloud' || STORAGE_MODE === 'local'){
    try{
      const raw = localStorage.getItem('ccc_local:'+key);
      return raw !== null ? JSON.parse(raw) : fallback;
    }catch(e){ /* seguimos abajo */ }
  }
  if (Object.prototype.hasOwnProperty.call(MEMORY_STORE, key)){
    try{ return JSON.parse(MEMORY_STORE[key]); }catch(e){ return fallback; }
  }
  return fallback;
}
async function dbSet(key, value){
  let supaOk = false, cloudOk = false, idbOk = false, localOk = false;
  if (STORAGE_MODE === 'supabase'){
    try{ await supabaseSet(key, value); supaOk = true; }catch(e){ supaOk = false; }
  }
  if (STORAGE_MODE === 'cloud'){
    try{ await window.storage.set(key, JSON.stringify(value), true); cloudOk = true; }
    catch(e){ cloudOk = false; STORAGE_OK = false; }
  }
  if (STORAGE_MODE === 'indexeddb' || STORAGE_MODE === 'cloud' || STORAGE_MODE === 'supabase'){
    try{ await idbSet(key, value); idbOk = true; }catch(e){ idbOk = false; }
  }
  if (STORAGE_MODE === 'local'){
    try{ localStorage.setItem('ccc_local:'+key, JSON.stringify(value)); localOk = true; }
    catch(e){ localOk = false; }
  }
  // Siempre espejo en memoria como último respaldo dentro de la misma sesión
  MEMORY_STORE[key] = JSON.stringify(value);
  if (STORAGE_MODE === 'supabase' && !supaOk){ STORAGE_MODE = idbOk ? 'indexeddb' : 'memory'; }
  else if (STORAGE_MODE === 'cloud' && !cloudOk){ STORAGE_MODE = idbOk ? 'indexeddb' : 'memory'; }
  else if (STORAGE_MODE === 'indexeddb' && !idbOk){ STORAGE_MODE = 'memory'; }
  else if (STORAGE_MODE === 'local' && !localOk){ STORAGE_MODE = 'memory'; }
}

async function recargarDatosDeNegocio(){
  DB.familias = await dbGet('ccc:familias', []);

  DB.seguimientos = await dbGet('ccc:seguimientos', []);
  DB.abonos = await dbGet('ccc:abonos', []);
  DB.auditoria = await dbGet('ccc:auditoria', []);
  const usuariosGuardados = await dbGet('ccc:usuarios', null);
  DB.usuarios = usuariosGuardados || [];
  let migrated = false;
  for (const u of DB.usuarios){
    if (!u.correo){ u.correo = (u.nombre||'usuario').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'.').replace(/^\.|\.$/g,'') + '@sunegocio.com'; migrated = true; }
    if (!u.passwordHash){ u.passwordHash = await hashText('cambiar123'); migrated = true; }
    if (!u.pregunta){ u.pregunta = '¿Cuál es su color favorito?'; u.respuestaHash = await hashText('azul'); migrated = true; }
    if (u.intentosFallidos === undefined){ u.intentosFallidos = 0; migrated = true; }
    if (u.bloqueadoHasta === undefined){ u.bloqueadoHasta = null; migrated = true; }
    if (!u.ultimoAcceso){ u.ultimoAcceso = null; migrated = true; }
    if (!u.creadoEl){ u.creadoEl = new Date().toISOString(); migrated = true; }
  }
  if (migrated) await saveUsuarios();
  DB.catalogos = await dbGet('ccc:catalogos', DB.catalogos);
  // Migración: el catálogo de actividades pasó de ser solo nombres a tener nombre + costo.
  let catalogosMigrados = false;
  if (Array.isArray(DB.catalogos.actividades)){
    DB.catalogos.actividades = DB.catalogos.actividades.map(a=>{
      if (typeof a === 'string'){ catalogosMigrados = true; return {nombre:a, costo:0}; }
      return a;
    });
  }
  if (catalogosMigrados) { await dbSet('ccc:catalogos', DB.catalogos); }
  // Migración: las inscripciones a actividades ya guardadas no tenían costo ni estado de pago.
  let actMigradas = false;
  DB.estudianteActividades.forEach(ea=>{
    if (!ea.id){ ea.id = cuid(); actMigradas = true; }
    if (ea.costo === undefined){ ea.costo = costoDeActividad(ea.actividad); actMigradas = true; }
    if (ea.pagado === undefined){ ea.pagado = false; actMigradas = true; }
    if (ea.fechaPago === undefined){ ea.fechaPago = ''; actMigradas = true; }
    if (ea.observaciones === undefined){ ea.observaciones = ''; actMigradas = true; }
  });
  if (actMigradas) { await dbSet('ccc:estudiante_actividades', DB.estudianteActividades); }
  // Auto-relación: cualquier estudiante sin familia asignada, cuyo código coincida exactamente
  // con el de una familia ya existente, se vincula solo — cubre datos cargados antes de este arreglo.
  const vinculadosAutomaticamente = vincularEstudiantesPorCodigoCoincidente();
  if (vinculadosAutomaticamente) { await dbSet('ccc:estudiantes', DB.estudiantes); }
}

function requireAuth(accion){
  if (!SESSION.authenticated){
    console.warn('Bloqueado: se intentó "' + accion + '" sin una sesión iniciada.');

// Guardado con fusión segura: en modo nube compartida, varias personas pueden guardar casi
// al mismo tiempo. Sobrescribir el arreglo completo a ciegas puede perder el cambio de otra
// persona ("lost update"). Aquí se vuelve a leer la versión más reciente justo antes de
// escribir, se fusiona por clave (nuestros cambios locales ganan sobre esa clave, pero lo que
// otros agregaron y nosotros no tocamos se conserva), y se aplican las eliminaciones explícitas.
async function mergeYGuardar(storageKey, localArray, keyField, deletedKeys){
  let resultado = localArray;
  if (STORAGE_MODE === 'cloud' || STORAGE_MODE === 'supabase'){
    try{
      const remoto = await dbGet(storageKey, []);
      const map = new Map();
      remoto.forEach(item => map.set(item[keyField], item));
      localArray.forEach(item => map.set(item[keyField], item));
      if (deletedKeys && deletedKeys.length) deletedKeys.forEach(k => map.delete(k));
      resultado = Array.from(map.values());
    }catch(e){ /* si la fusión falla, se guarda solo lo local (comportamiento previo, seguro) */ }
  }
  await dbSet(storageKey, resultado);
  return resultado;
}

/* =========================================================================
   HELPERS DE NEGOCIO
   ========================================================================= */
function semaforo(meses){
  meses = Number(meses)||0;
  if (meses <= 0) return {c:'verde', l:'Al día'};
  if (meses === 3) return {c:'amarillo', l:'3 meses'};
  if (meses >= 4 && meses <=5) return {c:'naranja', l:meses+' meses'};
  if (meses >= 6) return {c:'rojo', l:meses+' meses o más'};
  return {c:'verde', l:meses+' meses'};
}
function fmtMoney(n){
  n = Number(n)||0;
  return 'RD$ ' + n.toLocaleString('es-DO',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function normCode(s){ return String(s||'').trim().toUpperCase(); }
function estudianteByCodigo(cod){ const c=normCode(cod); return DB.estudiantes.find(e=>normCode(e.codigo)===c); }
function familiaByCodigo(cod){ const c=normCode(cod); return DB.familias.find(f=>normCode(f.codigo)===c); }
// Si un estudiante y una familia comparten exactamente el mismo código (convención usada por
// algunas instituciones: un mismo código identifica al estudiante y a su familia), se vinculan
// automáticamente — sin pisar un vínculo que el estudiante ya tuviera con otra familia distinta.
function vincularEstudiantesPorCodigoCoincidente(){
  let vinculados = 0;
  DB.estudiantes.forEach(est=>{
    if (est.codigoFamilia && est.codigoFamilia.trim()) return; // ya tiene familia asignada, no se toca
    const fam = familiaByCodigo(est.codigo);
    if (fam){ est.codigoFamilia = fam.codigo; vinculados++; }
  });
  return vinculados;
}
function periodosDisponibles(){
  return [...new Set(DB.cuentas.map(c=>c.periodo))].sort().reverse();
}
function ultimoPeriodo(){ const p = periodosDisponibles(); return p[0] || null; }
function diasDesde(fechaStr){
  if(!fechaStr) return Infinity;
  const d = new Date(fechaStr); const now = new Date();
  return Math.floor((now-d)/(1000*60*60*24));
}

// El ciclo de seguimiento de cuentas críticas va de Septiembre a Julio (no agosto).
const MESES_CICLO_ESCOLAR = ['09','10','11','12','01','02','03','04','05','06','07'];
function anioEscolar(periodo){
  if (!periodo || !/^\d{4}-\d{2}$/.test(periodo)) return '';
  const [y,m] = periodo.split('-').map(Number);
  return (m>=9) ? `${y}-${y+1}` : `${y-1}-${y}`;
}
function esMesFueraDeCiclo(periodo){
  if (!periodo || !/^\d{4}-\d{2}$/.test(periodo)) return false;
  const mes = periodo.split('-')[1];
  return !MESES_CICLO_ESCOLAR.includes(mes);
}
function abonosDeCuenta(cuentaId){
  return DB.abonos.filter(a=>a.cuentaId===cuentaId).sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
function totalAbonadoCuenta(cuentaId){
  return abonosDeCuenta(cuentaId).reduce((s,a)=>s+Number(a.monto||0),0);
}
function abonosDeEstudiante(codigoEstudiante){
  return DB.abonos.filter(a=>a.codigoEstudiante===codigoEstudiante).sort((a,b)=>b.fecha.localeCompare(a.fecha));
}
function balanceOriginal(cuenta){
  return Number(cuenta.balanceAnioAnterior||0) + Number(cuenta.balance||0);
}
function balancePendiente(cuenta){
  return Math.max(0, balanceOriginal(cuenta) - totalAbonadoCuenta(cuenta.id));
}
function actividadesPendientesDeEstudiante(codigoEstudiante){
  const pend = DB.estudianteActividades.filter(ea=>ea.codigoEstudiante===codigoEstudiante && !ea.pagado);
  return { count: pend.length, total: pend.reduce((s,a)=>s+Number(a.costo||0),0), items: pend };
}
// Todos los estudiantes que pertenecen a una misma familia (por Codigo_Familia) — para cuando
// una familia tiene más de un hijo y se necesita ver la deuda de todos juntos, no uno a la vez.
function estudiantesDeFamilia(codigoFamilia){
  const c = normCode(codigoFamilia);
  return DB.estudiantes.filter(e=>normCode(e.codigoFamilia)===c);
}
// Balance pendiente total de una familia: suma el balance pendiente MÁS RECIENTE de cada
// estudiante de esa familia (su último periodo reportado), más las actividades que deban.
function balanceFamiliar(codigoFamilia){
  const estudiantes = estudiantesDeFamilia(codigoFamilia);
  let totalCuentas = 0, totalActividades = 0;
  const detalle = estudiantes.map(est=>{
    const cuentasEst = DB.cuentas.filter(c=>c.codigoEstudiante===est.codigo).sort((a,b)=>b.periodo.localeCompare(a.periodo));
    const ultima = cuentasEst[0] || null;
    const pendienteEst = ultima ? balancePendiente(ultima) : 0;
    const actPend = actividadesPendientesDeEstudiante(est.codigo);
    totalCuentas += pendienteEst;
    totalActividades += actPend.total;
    return { estudiante: est, ultimaCuenta: ultima, pendiente: pendienteEst, actividadesPendientes: actPend };
  });
  return { estudiantes: detalle, totalCuentas, totalActividades, totalGeneral: totalCuentas + totalActividades };
}

function hasDemoData(){
  return DB.familias.some(f=>f._demo) || DB.estudiantes.some(e=>e._demo) || DB.cuentas.some(c=>c._demo) || DB.seguimientos.some(s=>s._demo) || DB.abonos.some(a=>a._demo);
}
async function eliminarDatosDemo(){
  const familiasBorradas = DB.familias.filter(f=>f._demo).map(f=>f.codigo);
  const estudiantesBorrados = DB.estudiantes.filter(e=>e._demo).map(e=>e.codigo);
  const cuentasBorradas = DB.cuentas.filter(c=>c._demo).map(c=>c.id);
  const seguimientosBorrados = DB.seguimientos.filter(s=>s._demo).map(s=>s.id);
  const abonosBorrados = DB.abonos.filter(a=>a._demo).map(a=>a.id);
  DB.familias = DB.familias.filter(f=>!f._demo);
  DB.estudiantes = DB.estudiantes.filter(e=>!e._demo);
  DB.cuentas = DB.cuentas.filter(c=>!c._demo);
  DB.seguimientos = DB.seguimientos.filter(s=>!s._demo);
  DB.abonos = DB.abonos.filter(a=>!a._demo);
  // Importante: se pasan las claves eliminadas explícitamente. Sin esto, en modo compartido
  // (Supabase/nube), la fusión segura no tenía forma de saber qué borrar y el "vaciado" no
  // surtía efecto — solo evitaba agregar de más, pero no quitaba lo que ya estaba guardado.
  await saveFamilias(familiasBorradas); await saveEstudiantes(estudiantesBorrados);
  await saveCuentas(cuentasBorradas); await saveSeguimientos(seguimientosBorrados); await saveAbonos(abonosBorrados);
  registrarAuditoria('Datos de muestra eliminados', '');
}
// Vacía TODOS los datos de negocio (familias, estudiantes, cuentas, seguimientos, abonos,
// inscripciones a actividades) — conserva usuarios, catálogos y el propio registro de auditoría.
async function vaciarTodosLosDatos(){
  const conteo = DB.familias.length + DB.estudiantes.length + DB.cuentas.length + DB.seguimientos.length + DB.abonos.length + DB.estudianteActividades.length;
  const frase = prompt(
    `Esto ELIMINARÁ PERMANENTEMENTE todos los datos de negocio de este sistema:\n` +
    `• ${DB.familias.length} familia(s)\n• ${DB.estudiantes.length} estudiante(s)\n• ${DB.cuentas.length} registro(s) de cuentas críticas\n` +
    `• ${DB.seguimientos.length} gestión(es)\n• ${DB.abonos.length} abono(s)\n• ${DB.estudianteActividades.length} inscripción(es) a actividades\n\n` +
    `Los usuarios, catálogos y el historial de auditoría NO se borran.\n\n` +
    `Esta acción no se puede deshacer. Se recomienda exportar un respaldo antes de continuar.\n\n` +
    `Para confirmar, escriba exactamente: VACIAR`
  );
  if (frase !== 'VACIAR'){ if (frase !== null) alert('No coincide con "VACIAR". No se hizo ningún cambio.'); return false; }
  // Se capturan las claves ANTES de vaciar los arreglos, para poder decírselo explícitamente
  // a la fusión segura (ver nota en eliminarDatosDemo — mismo motivo del bug).
  const clavesFamilias = DB.familias.map(f=>f.codigo);
  const clavesEstudiantes = DB.estudiantes.map(e=>e.codigo);
  const clavesCuentas = DB.cuentas.map(c=>c.id);
  const clavesSeguimientos = DB.seguimientos.map(s=>s.id);
  const clavesAbonos = DB.abonos.map(a=>a.id);
  DB.familias = []; DB.estudiantes = []; DB.cuentas = []; DB.seguimientos = []; DB.abonos = []; DB.estudianteActividades = [];
  await saveFamilias(clavesFamilias); await saveEstudiantes(clavesEstudiantes); await saveCuentas(clavesCuentas);
  await saveSeguimientos(clavesSeguimientos); await saveAbonos(clavesAbonos); await saveActividades();
  registrarAuditoria('Vaciado total de datos de negocio', `${conteo} registro(s) eliminados (familias, estudiantes, cuentas, seguimientos, abonos, actividades). Usuarios y catálogos conservados.`);
  return true;
}
function exportBackup(){
  const payload = {
    version: 1, sistema: 'Cuentas Críticas por Cobrar', exportadoEl: new Date().toISOString(),
    DB: {
      familias: DB.familias, estudiantes: DB.estudiantes, actividades: DB.actividades,
      estudianteActividades: DB.estudianteActividades, cuentas: DB.cuentas, seguimientos: DB.seguimientos,
      usuarios: DB.usuarios, abonos: DB.abonos, catalogos: DB.catalogos, auditoria: DB.auditoria
    }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `respaldo_cuentas_criticas_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  registrarAuditoria('Respaldo exportado', '');
}
async function importBackupFile(file, onDone, onError){
  try{
    const text = await file.text();
    const payload = JSON.parse(text);
    if (!payload || !payload.DB) throw new Error('El archivo no tiene el formato de respaldo esperado.');
    const d = payload.DB;
    DB.familias = d.familias || [];
    DB.estudiantes = d.estudiantes || [];
    DB.actividades = d.actividades || [];
    DB.estudianteActividades = d.estudianteActividades || [];
    DB.cuentas = d.cuentas || [];
    DB.seguimientos = d.seguimientos || [];
    DB.usuarios = d.usuarios || DB.usuarios;
    DB.abonos = d.abonos || [];
    DB.catalogos = d.catalogos || DB.catalogos;
    DB.auditoria = d.auditoria || DB.auditoria;
    // Restaurar un respaldo debe REEMPLAZAR todo por completo, no fusionarse con lo que ya
    // estuviera guardado (por eso se usa dbSet directo y no las funciones save*/mergeYGuardar,
    // que están pensadas para ediciones normales sin perder cambios ajenos, no para una restauración).
    await dbSet('ccc:familias', DB.familias);
    await dbSet('ccc:estudiantes', DB.estudiantes);
    await dbSet('ccc:actividades', DB.actividades);
    await dbSet('ccc:estudiante_actividades', DB.estudianteActividades);
    await dbSet('ccc:cuentas', DB.cuentas);
    await dbSet('ccc:seguimientos', DB.seguimientos);
    await dbSet('ccc:usuarios', DB.usuarios);
    await dbSet('ccc:abonos', DB.abonos);
    await dbSet('ccc:catalogos', DB.catalogos);
    await dbSet('ccc:seeded', true);
    registrarAuditoria('Respaldo restaurado', file.name||'');
    if (onDone) onDone();
  }catch(e){ if (onError) onError(e); }
}

          <thead><tr><th>#</th><th>Estudiante</th><th>Nivel</th><th>Meses</th><th>Balance original</th><th>Abonado</th><th>Pendiente</th><th>Semáforo</th><th>Estado</th></tr></thead>
          <tbody>
          ${top10.map((r,i)=>{ const s = semaforo(r.mesesAdeudados); return `<tr>
            <td>${i+1}</td><td>${r._est?r._est.nombre:r.codigoEstudiante}</td><td>${r._est?r._est.nivel:''}</td>
            <td class="mono">${r.mesesAdeudados}</td><td class="mono">${fmtMoney(balanceOriginal(r))}</td>
            <td class="mono" style="color:var(--verde)">${fmtMoney(totalAbonadoCuenta(r.id))}</td>
            <td class="mono" style="font-weight:700;">${fmtMoney(balancePendiente(r))}</td>
            <td><span class="badge b-${s.c}"><span class="dot dot-${s.c}"></span>${s.l}</span></td><td>${r.estado}</td></tr>`; }).join('') || '<tr><td colspan="9" class="small">Sin registros</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Actividades pendientes de pago <span class="n">${actividadesPendientes.length} · ${fmtMoney(montoActividadesPendientes)}</span></h2>
      ${actividadesPendientes.length===0 ? '<div class="small">No hay actividades pendientes de pago.</div>' :
        `<div class="tablewrap" style="max-height:280px;">
          <table><thead><tr><th>Estudiante</th><th>Familia</th><th>Actividad</th><th>Periodo</th><th>Costo</th></tr></thead>
          <tbody>${actividadesPendientes.slice(0,50).map(a=>{ const fam = a._est ? familiaByCodigo(a._est.codigoFamilia) : null; return `<tr>
            <td>${a._est?a._est.nombre:a.codigoEstudiante}</td><td>${fam?fam.responsable:''}</td>
            <td>${a.actividad}</td><td class="mono">${a.periodo}</td><td class="mono">${fmtMoney(a.costo)}</td>
          </tr>`; }).join('')}</tbody></table>
        </div>`}

  `;
  const goRespaldo = ()=>{ currentView='respaldo'; renderAll(); };
  const l1 = document.getElementById('dashGoRespaldo'); if (l1) l1.onclick = goRespaldo;
  const l2 = document.getElementById('dashGoRespaldo2'); if (l2) l2.onclick = goRespaldo;
}

/* =========================================================================
   REPORTE MENSUAL
   ========================================================================= */
function renderReporte(root){
  const periodos = periodosDisponibles();
  const periodo = ultimoPeriodo();
  root.innerHTML = `
    <div class="note">Ciclo de seguimiento: <b>Septiembre a Julio</b>. El "Balance pendiente" ya descuenta los abonos registrados para cada estudiante. Por defecto solo se muestran cuentas con saldo pendiente.</div>
    <div class="toolbar">
      <div class="field"><label>Periodo</label><select id="rPeriodo">${periodos.map(p=>`<option value="${p}" ${p===periodo?'selected':''}>${p} · ${anioEscolar(p)}</option>`).join('') || '<option value="">Sin datos</option>'}</select></div>
      <div class="field"><label>Nivel</label><select id="rNivel"><option value="">Todos</option>${DB.catalogos.niveles.map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Grado/Sección</label><select id="rGrado"><option value="">Todos</option>${DB.catalogos.grados.map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Estado</label><select id="rEstado"><option value="">Todos</option>${DB.catalogos.estadosCuenta.map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Responsable</label><select id="rResp"><option value="">Todos</option>${DB.catalogos.responsables.map(n=>`<option>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Rango de mora</label><select id="rRango"><option value="">Todos</option><option value="3">3 meses</option><option value="4_5">4–5 meses</option><option value="6">6+ meses</option></select></div>
      <div class="field"><label>&nbsp;</label><label style="display:flex;align-items:center;gap:6px;font-size:12.8px;font-weight:normal;padding:7px 0;"><input type="checkbox" id="rMostrarPagadas"> Mostrar cuentas ya saldadas/regularizadas</label></div>
      <div class="field"><label>&nbsp;</label><button class="btn" id="rExport" title="Genera un Excel con el mismo formato que la plantilla de importación, listo para editar y volver a subir">⭳ Exportar (reimportable)</button></div>
      ${perm('editarCuenta')?`<div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="rNuevaCuenta">+ Agregar registro manual</button></div>`:''}
    </div>
    <div class="tablewrap">
      <table>
        <thead><tr>
          <th>Código</th><th>Estudiante</th><th>Nivel</th><th>Grado</th><th>Internado</th><th>Familia</th><th>Teléfono</th>
          <th>Meses</th><th>Bal. año ant.</th><th>Bal. meses act.</th><th>Abonado</th><th>Bal. pendiente</th><th>Activ. pend.</th><th>Últ. pago</th><th>Semáforo</th><th>Estado</th><th>Responsable</th><th>Últ. gestión</th><th>Próx. seg.</th><th>Observaciones</th><th></th>
        </tr></thead>
        <tbody id="rBody"></tbody>
        <tfoot><tr class="tfoot-row"><td colspan="7">Totales (filtrado)</td><td id="rTotCasos"></td><td colspan="2"></td><td id="rTotBalance"></td><td id="rTotActividades"></td><td colspan="8"></td></tr></tfoot>
      </table>
    </div>
  `;
  const draw = ()=>{
    const p = document.getElementById('rPeriodo').value;
    const nivel = document.getElementById('rNivel').value;
    const grado = document.getElementById('rGrado').value;
    const estado = document.getElementById('rEstado').value;
    const resp = document.getElementById('rResp').value;
    const rango = document.getElementById('rRango').value;
    const mostrarPagadas = document.getElementById('rMostrarPagadas').checked;
    let rows = DB.cuentas.filter(c=>c.periodo===p).map(c=>({...c,_est:estudianteByCodigo(c.codigoEstudiante)}));
    if (!mostrarPagadas) rows = rows.filter(r=> balancePendiente(r) > 0 && r.estado !== 'Regularizado');
    if (nivel) rows = rows.filter(r=>r._est && r._est.nivel===nivel);
    if (grado) rows = rows.filter(r=>r._est && r._est.grado===grado);
    if (estado) rows = rows.filter(r=>r.estado===estado);
    if (resp) rows = rows.filter(r=>r.responsable===resp);
    if (rango) rows = rows.filter(r=>{
      const m = Number(r.mesesAdeudados||0);
      if (rango==='3') return m===3; if (rango==='4_5') return m>=4&&m<=5; if (rango==='6') return m>=6; return true;
    });
    const tbody = document.getElementById('rBody');
    tbody.innerHTML = rows.map(r=>{
      const s = semaforo(r.mesesAdeudados);
      const fam = r._est ? familiaByCodigo(r._est.codigoFamilia) : null;
      const canEditEstado = perm('editarCuenta');
      const abonado = totalAbonadoCuenta(r.id);
      const pendiente = balancePendiente(r);
      const actPend = actividadesPendientesDeEstudiante(r.codigoEstudiante);
      // Si el estudiante no está vinculado (código no coincide con ninguno del sistema), se
      // muestra igual el nombre/familia que traía el archivo importado, en vez de dejarlo en blanco.
      const nombreMostrar = r._est ? r._est.nombre : (r.nombreEstudianteImportado || '');
      const familiaMostrar = fam ? fam.responsable : (r.nombreFamiliaImportado || r.codigoFamiliaImportado || '');
      const sinVincular = !r._est;
      return `<tr>
        <td class="mono">${r.codigoEstudiante}</td>
        <td>${nombreMostrar || '<span class="small">—</span>'}${sinVincular?` <span class="pill-warn" title="No se encontró un estudiante con este código en el sistema — verifique que el código coincida exactamente con el de Estudiantes/Familias">⚠ No vinculado</span>`:''}</td>
        <td>${r._est?r._est.nivel:''}</td>
        <td>${r._est?r._est.grado:''}</td>
        <td>${r._est?r._est.internado:''}</td>
        <td>${familiaMostrar || ''}</td>
        <td class="mono">${fam?fam.tel1:''}</td>
        <td class="mono">${r.mesesAdeudados}</td>
        <td class="mono">${fmtMoney(r.balanceAnioAnterior)}</td>
        <td class="mono">${fmtMoney(r.balance)}</td>
        <td class="mono" style="color:var(--verde)">${fmtMoney(abonado)}</td>
        <td class="mono" style="font-weight:700;">${fmtMoney(pendiente)}</td>
        <td>${actPend.count>0?`<span class="badge b-naranja">${actPend.count} · ${fmtMoney(actPend.total)}</span>`:`<span class="small">—</span>`}</td>
        <td class="mono">${r.fechaUltimoPago||'—'}</td>
        <td><span class="badge b-${s.c}"><span class="dot dot-${s.c}"></span>${s.l}</span></td>
        <td>${canEditEstado ? `<select data-id="${r.id}" class="estadoSel">${DB.catalogos.estadosCuenta.map(e=>`<option ${e===r.estado?'selected':''}>${e}</option>`).join('')}</select>` : r.estado}</td>
        <td>${r.responsable||''}</td>
        <td class="mono">${r.fechaUltimaGestion||'—'}</td>
        <td class="mono">${r.proximoSeguimiento||'—'}</td>
        <td>${canEditEstado ? `<input type="text" class="obsInput" data-id="${r.id}" value="${(r.observaciones||'').replace(/"/g,'&quot;')}" placeholder="Escribir observación…" style="min-width:160px;border:1px solid var(--line);border-radius:6px;padding:5px 7px;font-family:var(--font-ui);font-size:12.3px;">` : `<span class="small">${r.observaciones||''}</span>`}</td>
        <td style="white-space:nowrap;">
          ${canEditEstado?`<button class="btn btn-sm" data-editar="${r.id}">✏ Editar</button>`:''}
          ${canEditEstado?`<button class="btn btn-sm btn-primary" data-abono="${r.id}">+ Abono</button>`:''}
          <button class="btn btn-sm" data-gest="${r.id}">+ Gestión</button>
          ${perm('eliminarRegistros')?`<button class="btn btn-sm btn-danger" data-delcuenta="${r.id}" title="Eliminar este registro">✕</button>`:''}
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="20" class="empty">${mostrarPagadas?'No hay registros con estos filtros.':'No hay cuentas con saldo pendiente en este periodo. Active "Mostrar cuentas ya saldadas/regularizadas" para ver el historial completo.'}</td></tr>`;
    document.getElementById('rTotCasos').textContent = rows.length + ' casos';
    document.getElementById('rTotBalance').textContent = fmtMoney(rows.reduce((s,r)=>s+balancePendiente(r),0));
    const totalActPend = rows.reduce((s,r)=>s+actividadesPendientesDeEstudiante(r.codigoEstudiante).total,0);
    document.getElementById('rTotActividades').textContent = fmtMoney(totalActPend) + ' activ.';

    tbody.querySelectorAll('.estadoSel').forEach(sel=>{
      sel.onchange = async ()=>{
        const c = DB.cuentas.find(c=>c.id===sel.dataset.id);
        c.estado = sel.value; await saveCuentas(); draw();
      };
    });
    tbody.querySelectorAll('.obsInput').forEach(inp=>{
      inp.onchange = async ()=>{
        const c = DB.cuentas.find(c=>c.id===inp.dataset.id);
        c.observaciones = inp.value; await saveCuentas();
      };
    });
    tbody.querySelectorAll('[data-delcuenta]').forEach(btn=>{
      btn.onclick = async ()=>{
        if (!perm('eliminarRegistros')){ alert('Su rol no tiene permiso para eliminar registros. Solo el Administrador puede hacerlo.'); return; }
        if (!confirm('¿Eliminar este registro de cuenta crítica del periodo? Esta acción no se puede deshacer. Los abonos asociados también se eliminarán.')) return;
        const cuentaId = btn.dataset.delcuenta;
        const cuentaBorrada = DB.cuentas.find(c=>c.id===cuentaId);
        const abonosBorrados = DB.abonos.filter(a=>a.cuentaId===cuentaId).map(a=>a.id);
        DB.abonos = DB.abonos.filter(a=>a.cuentaId!==cuentaId);
        DB.cuentas = DB.cuentas.filter(c=>c.id!==cuentaId);
        await saveAbonos(abonosBorrados); await saveCuentas([cuentaId]);
        registrarAuditoria('Cuenta crítica eliminada', cuentaBorrada ? `${cuentaBorrada.codigoEstudiante} · ${cuentaBorrada.periodo}` : cuentaId);
        draw();
      };
    });
    tbody.querySelectorAll('[data-editar]').forEach(btn=>{
      btn.onclick = ()=> openCuentaModal(btn.dataset.editar, p, draw);
    });
    tbody.querySelectorAll('[data-gest]').forEach(btn=>{
      btn.onclick = ()=> openGestionModal(btn.dataset.gest, draw);
    });
    tbody.querySelectorAll('[data-abono]').forEach(btn=>{
      btn.onclick = ()=> openAbonoModal(btn.dataset.abono, draw);
    });
    document.getElementById('rExport').onclick = ()=> exportarReporteReimportable(rows, `reporte_mensual_${p}.xlsx`);
  };
  ['rPeriodo','rNivel','rGrado','rEstado','rResp','rRango','rMostrarPagadas'].forEach(id=> document.getElementById(id).onchange = draw);
  const nuevaCuentaBtn = document.getElementById('rNuevaCuenta');
  if (nuevaCuentaBtn) nuevaCuentaBtn.onclick = ()=> openCuentaModal(null, document.getElementById('rPeriodo').value, ()=>{ renderReporte(root); });
  if (periodos.length) draw(); else document.getElementById('rBody').innerHTML = `<tr><td colspan="20" class="empty">Aún no hay datos importados.</td></tr>`;
}

function openAbonoModal(cuentaId, onDone){
  const c = DB.cuentas.find(c=>c.id===cuentaId);
  const est = estudianteByCodigo(c.codigoEstudiante);
  const pendienteAntes = balancePendiente(c);
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="mbg">
    <div class="modal">
      <h3>Registrar abono</h3>
      <p class="small">${est?est.nombre:c.codigoEstudiante} · ${c.codigoEstudiante} · Periodo ${c.periodo}</p>
      <p class="small">Balance pendiente actual: <b class="mono">${fmtMoney(pendienteAntes)}</b></p>
      <div class="formgrid">
        <div><label>Fecha del abono</label><input type="date" id="aFecha" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><label>Monto abonado</label><input type="number" id="aMonto" min="0" step="0.01" placeholder="0.00"></div>
        <div class="full"><label>Observaciones</label><textarea id="aObs" placeholder="Ej. Pago en efectivo, transferencia, referencia…"></textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="aCancel">Cancelar</button>
        <button class="btn btn-primary" id="aGuardar">Guardar abono</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mbg').onclick = (e)=>{ if(e.target.id==='mbg') closeModal(); };
  document.getElementById('aCancel').onclick = closeModal;
  document.getElementById('aGuardar').onclick = async ()=>{
    const monto = Number(document.getElementById('aMonto').value||0);
    const fecha = document.getElementById('aFecha').value;
    if (!fecha){ alert('Indique la fecha del abono.'); return; }
    if (!monto || monto <= 0){ alert('Indique un monto de abono mayor a cero.'); return; }
    DB.abonos.push({ id:cuid(), codigoEstudiante:c.codigoEstudiante, cuentaId:c.id, fecha, monto, observaciones:document.getElementById('aObs').value, registradoPor:SESSION.usuario });
    if (!c.fechaUltimoPago || fecha >= c.fechaUltimoPago) { c.fechaUltimoPago = fecha; c.montoUltimoPago = monto; }
    await saveAbonos();
    let seRegularizo = false;
    if (balancePendiente(c) <= 0 && c.estado !== 'Regularizado'){ c.estado = 'Regularizado'; seRegularizo = true; }
    await saveCuentas();
    registrarAuditoria('Abono registrado', `${c.codigoEstudiante} · ${fmtMoney(monto)} · ${fecha}${seRegularizo?' · cuenta marcada como Regularizado automáticamente':''}`);
    closeModal(); if (onDone) onDone();
  };
}

function openCuentaModal(cuentaId, periodoSugerido, onDone){
  const editing = cuentaId ? DB.cuentas.find(c=>c.id===cuentaId) : null;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="mbg">
    <div class="modal">
      <h3>${editing?'Editar registro de cuenta crítica':'Agregar registro de cuenta crítica'}</h3>
      <p class="small">Escriba directamente los datos del estudiante para este periodo. No se sobrescriben periodos anteriores.</p>
      <div class="formgrid">
        <div><label>Estudiante</label>
          <select id="cEstudiante">${DB.estudiantes.map(e=>`<option value="${e.codigo}" ${editing&&editing.codigoEstudiante===e.codigo?'selected':''}>${e.nombre} (${e.codigo})</option>`).join('') || '<option value="">No hay estudiantes — cree uno primero</option>'}</select>
        </div>
        <div><label>Periodo (AAAA-MM, ciclo Sept–Jul)</label><input type="text" id="cPeriodo" placeholder="2026-09" value="${editing?editing.periodo:(periodoSugerido||'')}"></div>
        <div><label>Meses adeudados (año en curso)</label><input type="number" id="cMeses" min="0" value="${editing?editing.mesesAdeudados:''}"></div>
        <div><label>Balance año anterior</label><input type="number" id="cBalanceAnioAnt" min="0" step="0.01" placeholder="0.00" value="${editing?editing.balanceAnioAnterior:'0'}"></div>
        <div><label>Balance meses año actual</label><input type="number" id="cBalance" min="0" step="0.01" value="${editing?editing.balance:''}"></div>
        <div><label>Fecha último pago</label><input type="date" id="cFechaPago" value="${editing?editing.fechaUltimoPago:''}"></div>
        <div><label>Monto último pago</label><input type="number" id="cMontoPago" min="0" step="0.01" value="${editing?editing.montoUltimoPago:''}"></div>
        <div><label>Estado de gestión</label><select id="cEstado">${DB.catalogos.estadosCuenta.map(e=>`<option ${editing&&editing.estado===e?'selected':''}>${e}</option>`).join('')}</select></div>
        <div><label>Responsable asignado</label><select id="cResp">${DB.catalogos.responsables.map(r=>`<option ${editing&&editing.responsable===r?'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label>Última gestión</label><input type="date" id="cUltGest" value="${editing?editing.fechaUltimaGestion:''}"></div>
        <div><label>Próximo seguimiento</label><input type="date" id="cProxSeg" value="${editing?editing.proximoSeguimiento:''}"></div>
        <div class="full"><label>Observaciones</label><textarea id="cObs">${editing?editing.observaciones:''}</textarea></div>
      </div>
      <p class="small">Los abonos (pagos) no se registran aquí — una vez creado el registro, use el botón "+ Abono" en el Reporte Mensual para ir descontándolos del balance.</p>
      <div class="modal-actions">
        <button class="btn" id="cCancel">Cancelar</button>
        <button class="btn btn-primary" id="cGuardar">${editing?'Guardar cambios':'Agregar registro'}</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mbg').onclick = (e)=>{ if(e.target.id==='mbg') closeModal(); };
  document.getElementById('cCancel').onclick = closeModal;
  document.getElementById('cGuardar').onclick = async ()=>{
    const codigoEstudiante = document.getElementById('cEstudiante').value;
    const periodo = document.getElementById('cPeriodo').value.trim();
    if (!codigoEstudiante){ alert('Debe seleccionar un estudiante.'); return; }
    if (!/^\d{4}-\d{2}$/.test(periodo)){ alert('El periodo debe tener formato AAAA-MM, por ejemplo 2026-09.'); return; }
    if (esMesFueraDeCiclo(periodo) && !confirm('El mes indicado está fuera del ciclo de seguimiento (Septiembre a Julio). ¿Desea continuar de todas formas?')) return;
    const data = {
      codigoEstudiante, periodo,
      mesesAdeudados: Number(document.getElementById('cMeses').value||0),
      balanceAnioAnterior: Number(document.getElementById('cBalanceAnioAnt').value||0),
      balance: Number(document.getElementById('cBalance').value||0),
      fechaUltimoPago: document.getElementById('cFechaPago').value,
      montoUltimoPago: document.getElementById('cMontoPago').value,
      estado: document.getElementById('cEstado').value,
      responsable: document.getElementById('cResp').value,
      fechaUltimaGestion: document.getElementById('cUltGest').value,
      proximoSeguimiento: document.getElementById('cProxSeg').value,
      observaciones: document.getElementById('cObs').value
    };
    if (editing){ Object.assign(editing, data); }
    else { DB.cuentas.push({id:cuid(), ...data}); }
    await saveCuentas();
    registrarAuditoria(editing?'Cuenta crítica editada':'Cuenta crítica creada', `${codigoEstudiante} · ${periodo}`);
    closeModal(); if (onDone) onDone();
  };
}

function openGestionModal(cuentaId, onDone, codigoEstudianteFallback){
  const c = cuentaId ? DB.cuentas.find(c=>c.id===cuentaId) : null;
  const codigoEstudiante = c ? c.codigoEstudiante : codigoEstudianteFallback;
  const est = estudianteByCodigo(codigoEstudiante);
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="mbg">
    <div class="modal">
      <h3>Registrar gestión</h3>
      <p class="small">${est?est.nombre:codigoEstudiante} · ${codigoEstudiante}</p>
      <div class="formgrid">
        <div><label>Fecha</label><input type="date" id="gFecha" value="${new Date().toISOString().slice(0,10)}"></div>
        <div><label>Responsable</label><select id="gResp">${DB.catalogos.responsables.map(r=>`<option ${r===SESSION.usuario?'selected':''}>${r}</option>`).join('')}</select></div>
        <div><label>Medio de contacto</label><select id="gMedio">${DB.catalogos.mediosContacto.map(m=>`<option>${m}</option>`).join('')}</select></div>
        <div><label>Resultado</label><select id="gResultado">${DB.catalogos.resultadosGestion.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div><label>Próxima gestión</label><input type="date" id="gProxima"></div>
        <div class="full"><label>Observaciones</label><textarea id="gObs"></textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="gCancel">Cancelar</button>
        <button class="btn btn-primary" id="gGuardar">Guardar gestión</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mbg').onclick = (e)=>{ if(e.target.id==='mbg') closeModal(); };
  document.getElementById('gCancel').onclick = closeModal;
  document.getElementById('gGuardar').onclick = async ()=>{
    const seg = {
      id: cuid(), fecha: document.getElementById('gFecha').value, codigoEstudiante: codigoEstudiante,
      responsable: document.getElementById('gResp').value, medio: document.getElementById('gMedio').value,
      resultado: document.getElementById('gResultado').value, proximaGestion: document.getElementById('gProxima').value,
      observaciones: document.getElementById('gObs').value, creadoPor: SESSION.usuario
    };
    DB.seguimientos.push(seg);

// Eliminar una gestión. Se revisa el permiso aquí también, no solo al ocultar el botón —
// misma defensa en dos capas que se usa para cuentas críticas y actividades.
async function eliminarGestion(seguimientoId, onDone){
  if (!perm('eliminarRegistros')){ alert('Su rol no tiene permiso para eliminar registros. Solo el Administrador puede hacerlo.'); return; }
  const seg = DB.seguimientos.find(s=>s.id===seguimientoId);
  if (!seg) return;
  if (!confirm(`¿Eliminar esta gestión del ${seg.fecha} (${seg.medio} · ${seg.resultado})? Esta acción no se puede deshacer.`)) return;
  DB.seguimientos = DB.seguimientos.filter(s=>s.id!==seguimientoId);
  await saveSeguimientos([seguimientoId]);
  registrarAuditoria('Gestión eliminada', `${seg.codigoEstudiante} · ${seg.fecha} · ${seg.medio} · ${seg.resultado}`);
  if (onDone) onDone();
}
// Elimina un estudiante por completo, junto con todo lo que dependa de él (cuentas críticas,
// abonos de esas cuentas, seguimientos, e inscripciones a actividades) — para no dejar registros
// huérfanos apuntando a un código de estudiante que ya no existe. Solo Administrador.
async function eliminarEstudianteCompleto(codigoEstudiante, onDone){
  if (!perm('eliminarRegistros')){ alert('Su rol no tiene permiso para eliminar registros. Solo el Administrador puede hacerlo.'); return; }
  const est = estudianteByCodigo(codigoEstudiante);
  if (!est) return;
  const cuentasDelEst = DB.cuentas.filter(c=>c.codigoEstudiante===codigoEstudiante);
  const cuentaIds = cuentasDelEst.map(c=>c.id);
  const abonosDelEst = DB.abonos.filter(a=>a.codigoEstudiante===codigoEstudiante);
  const seguimientosDelEst = DB.seguimientos.filter(s=>s.codigoEstudiante===codigoEstudiante);
  const actividadesDelEst = DB.estudianteActividades.filter(a=>a.codigoEstudiante===codigoEstudiante);
  const resumen = `Esto eliminará PERMANENTEMENTE a "${est.nombre}" (${codigoEstudiante}) y todo lo asociado a este estudiante:\n` +
    `• ${cuentasDelEst.length} registro(s) de cuentas críticas\n• ${abonosDelEst.length} abono(s)\n` +
    `• ${seguimientosDelEst.length} gestión(es) de seguimiento\n• ${actividadesDelEst.length} inscripción(es) a actividades\n\n` +
    `Esta acción no se puede deshacer. ¿Continuar?`;
  if (!confirm(resumen)) return;
  DB.cuentas = DB.cuentas.filter(c=>c.codigoEstudiante!==codigoEstudiante);
  DB.abonos = DB.abonos.filter(a=>a.codigoEstudiante!==codigoEstudiante);
  DB.seguimientos = DB.seguimientos.filter(s=>s.codigoEstudiante!==codigoEstudiante);
  DB.estudianteActividades = DB.estudianteActividades.filter(a=>a.codigoEstudiante!==codigoEstudiante);
  DB.estudiantes = DB.estudiantes.filter(e=>e.codigo!==codigoEstudiante);
  await saveCuentas(cuentaIds);
  await saveAbonos(abonosDelEst.map(a=>a.id));
  await saveSeguimientos(seguimientosDelEst.map(s=>s.id));
  await saveActividades(); // estudianteActividades se guarda con dbSet directo, no necesita deletedKeys
  await saveEstudiantes([codigoEstudiante]);
  registrarAuditoria('Estudiante eliminado', `${codigoEstudiante} · ${est.nombre} (junto con ${cuentasDelEst.length} cuenta(s), ${abonosDelEst.length} abono(s), ${seguimientosDelEst.length} gestión(es), ${actividadesDelEst.length} actividad(es))`);
  if (onDone) onDone();
}

function exportCSV(rows, filename){
  if (!rows.length){ alert('No hay filas para exportar.'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(',')].concat(rows.map(r=>headers.map(h=>`"${String(r[h]??'').replace(/"/g,'""')}"`).join(','))).join('\n');
  const blob = new Blob(["\ufeff"+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// Exporta el Reporte Mensual (filtrado) con las MISMAS columnas que la plantilla de importación
// (Codigo_Estudiante, Periodo_Reporte, Meses_Adeudados, etc.), en .xlsx, para poder editarlo en
// Excel y volver a subirlo directamente desde "Importar Datos" sin tener que acomodar columnas.
function exportarReporteReimportable(rows, filename){
  if (!rows.length){ alert('No hay filas para exportar con estos filtros.'); return; }
  const headers = ["Codigo_Estudiante*","Nombre_Estudiante","Codigo_Familia","Nombre_Familia","Nivel","Grado","Periodo_Reporte(AAAA-MM)*","Meses_Adeudados*","Balance_Anio_Anterior","Balance_Meses_Actuales*","Fecha_Ultimo_Pago","Monto_Ultimo_Pago","Estado_Gestion*","Responsable_Asignado*","Fecha_Ultima_Gestion","Proximo_Seguimiento","Observaciones"];
  const datos = rows.map(r=>{
    const est = r._est || estudianteByCodigo(r.codigoEstudiante);
    const fam = est ? familiaByCodigo(est.codigoFamilia) : null;
    return [
      r.codigoEstudiante,
      est?est.nombre:(r.nombreEstudianteImportado||''),
      est?est.codigoFamilia:(r.codigoFamiliaImportado||''),
      fam?fam.responsable:(r.nombreFamiliaImportado||''),
      est?est.nivel:'', est?est.grado:'',
      r.periodo, r.mesesAdeudados, r.balanceAnioAnterior||0, r.balance,
      r.fechaUltimoPago||'', r.montoUltimoPago||'', r.estado, r.responsable||'',
      r.fechaUltimaGestion||'', r.proximoSeguimiento||'', r.observaciones||''
    ];
  });
  const ws = XLSX.utils.aoa_to_sheet([headers, ...datos]);
  ws['!cols'] = headers.map(()=>({wch:20}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Reporte_Mensual");
  XLSX.writeFile(wb, filename);
}

function readFileAsRows(file, cb){
  const reader = new FileReader();
  reader.onload = (e)=>{
    const wb = XLSX.read(e.target.result, {type:'binary'});
    const ws = wb.Sheets[wb.SheetNames.find(n=>n.toLowerCase()!=='instrucciones') || wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    cb(rows);
  };
  reader.readAsBinaryString(file);
}
function normKey(k){ return k.replace(/\*/g,'').replace(/\(.*?\)/g,'').trim(); }
function normalizeRow(row){
  const out = {};
  Object.keys(row).forEach(k=>{
    const key = normKey(k);
    let v = row[k];
    // Excel a veces guarda columnas de código como números (pierde ceros a la izquierda, etc.)
    // Forzamos texto para que las comparaciones de código sean siempre consistentes.
    if (v !== null && v !== undefined) v = String(v).trim();
    if (key.indexOf('Codigo')===0) v = normCode(v);
    out[key] = v;
  });
  return out;
}
function isExampleRow(row, keyField){
  return false; // el usuario debe borrar filas de ejemplo; no se filtra automáticamente para evitar perder datos reales
}

function previewFamilias(rows){
  const req = ["Codigo_Familia","Nombre_Responsable_Pago","Telefono_Principal","Estado_Familia"];
  const codesSeen = new Set(); let hardErrors = 0;
  const analyzed = rows.map(r=>{
    const errs = [];
    req.forEach(f=>{ if(!r[f]) errs.push(`Falta ${f}`); });
    if (r.Codigo_Familia){
      if (codesSeen.has(r.Codigo_Familia)) errs.push('Código duplicado en archivo');
      codesSeen.add(r.Codigo_Familia);
    }
    if (r.Estado_Familia && !['Activo','Inactivo'].includes(r.Estado_Familia)) errs.push('Estado inválido');
