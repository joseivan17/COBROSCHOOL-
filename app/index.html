          <div>📄 Haga clic para seleccionar el archivo del <b>Reporte Mensual</b></div>
          <input type="file" id="fileRep" accept=".xlsx,.xls,.csv">
        </label>
      </div>
    </div>
    <div id="previewRep"></div>
  `;
  document.getElementById('tplRep').onclick = ()=>downloadTemplate('reporte');
  document.getElementById('fileRep').onchange = (e)=>{
    if (!e.target.files[0]) return;
    readFileAsRows(e.target.files[0], rows=> previewReporte(rows.map(normalizeRow)));
  };
}
function previewReporte(rows){
  const req = ["Codigo_Estudiante","Periodo_Reporte","Meses_Adeudados","Balance_Meses_Actuales","Estado_Gestion","Responsable_Asignado"];
  let crearFaltantes = false;
  const analyze = ()=> rows.map(r=>{
    const errs = []; const warns = [];
    req.forEach(f=>{ if(r[f]===undefined || r[f]==='') errs.push(`Falta ${f}`); });
    if (r.Estado_Gestion && !DB.catalogos.estadosCuenta.includes(r.Estado_Gestion)) errs.push('Estado de gestión no reconocido');
    if (r.Meses_Adeudados!==undefined && isNaN(Number(r.Meses_Adeudados))) errs.push('Meses adeudados debe ser numérico');
    if (r.Balance_Meses_Actuales!==undefined && isNaN(Number(r.Balance_Meses_Actuales))) errs.push('Balance de meses actuales debe ser numérico');
    if (r.Balance_Anio_Anterior!==undefined && r.Balance_Anio_Anterior!=='' && isNaN(Number(r.Balance_Anio_Anterior))) errs.push('Balance año anterior debe ser numérico');
    if (r.Periodo_Reporte && esMesFueraDeCiclo(r.Periodo_Reporte)) warns.push('Mes fuera del ciclo Sept–Jul');
    const existe = !!estudianteByCodigo(r.Codigo_Estudiante);
    if (!existe && !crearFaltantes) warns.push('Estudiante no existe en el sistema');
    let familiaExiste = null, familiaCambia = false;
    if (r.Codigo_Familia){
      familiaExiste = !!familiaByCodigo(r.Codigo_Familia);
      if (!familiaExiste) warns.push(`Familia ${r.Codigo_Familia} no existe — no se vinculará`);
      else {
        const est = estudianteByCodigo(r.Codigo_Estudiante);
        if (est && normCode(est.codigoFamilia) !== normCode(r.Codigo_Familia)) familiaCambia = true;
      }
    }
    return {r, errs, warns, existe, familiaExiste, familiaCambia};
  });
  const box = document.getElementById('previewRep');
  function draw(){
    const analyzed = analyze();
    const hardErrors = analyzed.filter(a=>a.errs.length>0).length;
    const faltantes = analyzed.filter(a=>!a.existe).length;
    const cambiosFamilia = analyzed.filter(a=>a.familiaCambia).length;
    box.innerHTML = `
      <div class="card">
        <h2>Vista previa — Reporte Mensual <span class="n">${rows.length} filas</span></h2>
        ${hardErrors>0?`<div class="alertbox">${hardErrors} fila(s) con errores de formato — no se importarán.</div>`:''}
        ${faltantes>0?`<div class="note">${faltantes} fila(s) referencian estudiantes que no existen todavía en el sistema.
          <label style="margin-left:10px;"><input type="checkbox" id="chkCrear" ${crearFaltantes?'checked':''}> Crear automáticamente estos estudiantes (con datos mínimos, editables luego en "Estudiantes/Familias")</label></div>`:''}
        ${cambiosFamilia>0?`<div class="note">${cambiosFamilia} fila(s) vincularán automáticamente al estudiante con la familia indicada en "Codigo_Familia" (ya existe en el sistema, coincide por código).</div>`:''}
        <div class="tablewrap" style="max-height:320px;">
          <table><thead><tr><th>Código Est.</th><th>Estudiante</th><th>Familia</th><th>Periodo</th><th>Meses</th><th>Bal. año ant.</th><th>Bal. meses act.</th><th>Estado</th><th>Responsable</th><th>Validación</th></tr></thead>
          <tbody>${analyzed.map(a=>`<tr>
            <td class="mono">${a.r.Codigo_Estudiante||''}</td><td>${a.r.Nombre_Estudiante||''}</td>
            <td class="mono">${a.r.Codigo_Familia||''}${a.r.Nombre_Familia?` <span class="small">(${a.r.Nombre_Familia})</span>`:''}</td>
            <td class="mono">${a.r.Periodo_Reporte||''}</td><td class="mono">${a.r.Meses_Adeudados??''}</td>
            <td class="mono">${a.r.Balance_Anio_Anterior||0}</td><td class="mono">${a.r.Balance_Meses_Actuales??''}</td>
            <td>${a.r.Estado_Gestion||''}</td><td>${a.r.Responsable_Asignado||''}</td>
            <td>${a.errs.length? `<span class="pill-error">${a.errs.join('; ')}</span>` : (a.warns.length? `<span class="pill-warn">${a.warns.join('; ')}</span>` : `<span class="pill-ok">OK</span>`)}</td>
          </tr>`).join('')}</tbody></table>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;">
          <button class="btn btn-primary" id="confirmRep">Confirmar importación (${analyzed.filter(a=>a.errs.length===0).length} filas)</button>
          <button class="btn" id="cancelRep">Cancelar</button>
        </div>
      </div>`;
    const chk = document.getElementById('chkCrear');
    if (chk) chk.onchange = ()=>{ crearFaltantes = chk.checked; draw(); };
    document.getElementById('cancelRep').onclick = ()=>{
      box.innerHTML = '';
      const fileInput = document.getElementById('fileRep'); if (fileInput) fileInput.value = '';
    };
    document.getElementById('confirmRep').onclick = async ()=>{
      let importadas = 0, actualizadas = 0, estCreados = 0, familiasVinculadas = 0, responsablesNuevos = 0, sinVincular = 0;
      let estudiantesModificados = false, catalogosModificados = false;
      analyzed.filter(a=>a.errs.length===0).forEach(a=>{
        const r = a.r;
        if (!a.existe){
          if (crearFaltantes){
            // Si el archivo trae Codigo_Familia y esa familia ya existe, el estudiante nuevo
            // se crea ya vinculado a ella automáticamente — sin necesidad de un paso aparte.
            const familiaInicial = (r.Codigo_Familia && a.familiaExiste) ? normCode(r.Codigo_Familia) : '';
            DB.estudiantes.push({codigo:r.Codigo_Estudiante, nombre:r.Nombre_Estudiante||'(Pendiente de completar)', codigoFamilia:familiaInicial, nivel:r.Nivel||'', grado:r.Grado||'', internado:'No', internadoInicio:'', internadoFin:'', estado:'Activo'});
            estCreados++;
            estudiantesModificados = true;
            if (familiaInicial) familiasVinculadas++;
          } else {
            // No se creó el estudiante formalmente, pero el registro de deuda SÍ se importa —
            // se muestra con los datos que traía el archivo, marcado como "no vinculado", para
            // que Dirección no pierda de vista quién debe aunque falte completar su ficha.
            sinVincular++;
          }
        } else if (a.familiaCambia && a.familiaExiste){
          // Estudiante ya existente: si el código de familia del archivo coincide con una familia
          // real y es distinto al que tenía, se actualiza el vínculo automáticamente.
          const est = estudianteByCodigo(r.Codigo_Estudiante);
          est.codigoFamilia = normCode(r.Codigo_Familia);
          estudiantesModificados = true;
          familiasVinculadas++;
        }
        // Si el responsable indicado en el archivo no está todavía en el catálogo, se agrega solo
        // — así aparece disponible de inmediato en el desplegable de "Responsable" del Reporte Mensual.
        if (r.Responsable_Asignado && !DB.catalogos.responsables.includes(r.Responsable_Asignado)){
          DB.catalogos.responsables.push(r.Responsable_Asignado);
          catalogosModificados = true;
          responsablesNuevos++;
        }
        // Si ya existe un registro de cuenta crítica para este MISMO estudiante y este MISMO
        // periodo, se actualiza en su lugar — nunca se duplica. El "id" se conserva para no
        // desvincular los abonos que ya se hubieran registrado contra ese registro.
        const cuentaExistenteIdx = DB.cuentas.findIndex(c=> normCode(c.codigoEstudiante)===normCode(r.Codigo_Estudiante) && c.periodo===r.Periodo_Reporte);
        const datosCuenta = {
          codigoEstudiante:r.Codigo_Estudiante, periodo:r.Periodo_Reporte, mesesAdeudados:Number(r.Meses_Adeudados),
          balanceAnioAnterior:Number(r.Balance_Anio_Anterior||0), balance:Number(r.Balance_Meses_Actuales), fechaUltimoPago:r.Fecha_Ultimo_Pago||'', montoUltimoPago:r.Monto_Ultimo_Pago||'',
          estado:r.Estado_Gestion, responsable:r.Responsable_Asignado, fechaUltimaGestion:r.Fecha_Ultima_Gestion||'',
          proximoSeguimiento:r.Proximo_Seguimiento||'', observaciones:r.Observaciones||'',
          // Respaldo: si por algún motivo el estudiante no llega a vincularse (código distinto,
          // no encontrado, etc.), el Reporte Mensual igual muestra estos datos en vez de dejarlos vacíos.
          nombreEstudianteImportado: r.Nombre_Estudiante||'', nombreFamiliaImportado: r.Nombre_Familia||'', codigoFamiliaImportado: r.Codigo_Familia||''
        };
        if (cuentaExistenteIdx >= 0){
          DB.cuentas[cuentaExistenteIdx] = { ...DB.cuentas[cuentaExistenteIdx], ...datosCuenta, id: DB.cuentas[cuentaExistenteIdx].id };
          actualizadas++;
        } else {
          DB.cuentas.push({ id: cuid(), ...datosCuenta });
          importadas++;
        }
      });
      await saveCuentas(); if (estudiantesModificados) await saveEstudiantes(); if (catalogosModificados) await saveCatalogos();
      registrarAuditoria('Importación de reporte mensual', `${importadas} creado(s), ${actualizadas} actualizado(s) (sin duplicar), ${estCreados} estudiante(s) creado(s), ${familiasVinculadas} vínculo(s) de familia actualizados, ${responsablesNuevos} responsable(s) nuevo(s), ${sinVincular} sin vincular a un estudiante`);
      box.innerHTML = `<div class="note">Importación completada: ${importadas} registro(s) nuevo(s)${actualizadas?`, ${actualizadas} registro(s) ya existentes actualizados (no se duplicaron)`:''}${estCreados?`, ${estCreados} estudiante(s) creado(s) automáticamente`:''}${familiasVinculadas?`, ${familiasVinculadas} vínculo(s) con familias actualizados automáticamente por código`:''}${responsablesNuevos?`, ${responsablesNuevos} responsable(s) nuevo(s) agregados al catálogo (ya disponibles en el desplegable)`:''}. Recuerde: los abonos se registran dentro de la app, no por Excel.</div>
      ${sinVincular?`<div class="alertbox">${sinVincular} registro(s) se importaron con el nombre/familia del archivo, pero <b>no se pudieron vincular a un estudiante existente</b> (el "Codigo_Estudiante" del archivo no coincide con ninguno del sistema). Búsquelos en el Reporte Mensual con la etiqueta "⚠ No vinculado" — revise que el código coincida exactamente con el de "Estudiantes/Familias", o marque "Crear automáticamente" la próxima vez.</div>`:''}`;
    };
  }
  draw();
}

function renderFichas(root){
  const canEdit = perm('editarFicha');
  root.innerHTML = `
    <div class="toolbar">
      <div class="searchbar"><input id="fichaSearch" placeholder="Buscar por código de familia, responsable, o nombre/código de estudiante…"></div>
      ${canEdit?`<div class="field"><label>&nbsp;</label><button class="btn" id="fNuevaFamilia">+ Nueva familia</button></div>
      <div class="field"><label>&nbsp;</label><button class="btn btn-primary" id="fNuevoEstudiante">+ Nuevo estudiante</button></div>`:''}
    </div>
    <div class="grid grid-2" style="align-items:start;">
      <div class="card"><h2>Familias <span class="n" id="fichaCount"></span></h2>
        <p class="small" style="margin-top:-6px;margin-bottom:10px;">Haga clic en una familia para ver a sus estudiantes.</p>
        <div class="tablewrap" style="max-height:560px;"><table><thead><tr><th>Código</th><th>Familia / Estudiante</th><th>Nivel / Cant.</th><th>Teléfono</th></tr></thead><tbody id="fichaList"></tbody></table></div>
      </div>
      <div id="fichaDetail" class="card"><div class="empty">Seleccione una familia y luego un estudiante para ver su ficha completa.</div></div>
    </div>
  `;
  const search = document.getElementById('fichaSearch');
  const expandedFamilias = new Set();
  const drawList = ()=>{
    const q = (search.value||'').toLowerCase();
    const grupos = DB.familias.map(fam=>({
      fam, hijos: DB.estudiantes.filter(e=> normCode(e.codigoFamilia)===normCode(fam.codigo))
    }));
    const sinFamilia = DB.estudiantes.filter(e=> !e.codigoFamilia || !familiaByCodigo(e.codigoFamilia));

    const coincideHijo = (h)=> h.nombre.toLowerCase().includes(q) || h.codigo.toLowerCase().includes(q);
    const gruposFiltrados = grupos.filter(({fam, hijos})=>{
      if (!q) return true;
      return fam.codigo.toLowerCase().includes(q) || fam.responsable.toLowerCase().includes(q) || hijos.some(coincideHijo);
    });
    const sinFamiliaFiltrada = sinFamilia.filter(h=> !q || coincideHijo(h));

    document.getElementById('fichaCount').textContent = `${gruposFiltrados.length} familias · ${DB.estudiantes.length} estudiantes`;

    let html = '';
    gruposFiltrados.forEach(({fam, hijos})=>{
      const autoExpandir = !!q && hijos.some(coincideHijo) && !fam.codigo.toLowerCase().includes(q) && !fam.responsable.toLowerCase().includes(q);
      const expandido = expandedFamilias.has(fam.codigo) || autoExpandir;
      html += `<tr class="linklike-row" data-famtoggle="${fam.codigo}" style="cursor:pointer;background:var(--paper);">
        <td class="mono" style="font-weight:700;">${expandido?'▾':'▸'} ${fam.codigo}</td>
        <td style="font-weight:700;">${fam.responsable}</td>
        <td>${hijos.length} estudiante${hijos.length!==1?'s':''}</td>
        <td class="mono small">${fam.tel1||''}</td>
      </tr>`;
      if (expandido){
        if (!hijos.length){
          html += `<tr><td></td><td colspan="2" class="small" style="color:var(--muted);">Sin estudiantes vinculados a esta familia todavía.</td>
            <td>${perm('eliminarRegistros')?`<button class="btn btn-sm btn-danger" data-delfam="${fam.codigo}">Eliminar familia</button>`:''}</td></tr>`;
        }
        hijos.forEach(h=>{
          html += `<tr class="linklike-row" data-c="${h.codigo}" style="cursor:pointer;">
            <td class="mono small" style="padding-left:26px;">${h.codigo}</td>
            <td>${h.nombre}</td>
            <td class="small">${h.nivel||''} ${h.grado||''}</td>
            <td></td>
          </tr>`;
        });
      }
    });
    if (sinFamiliaFiltrada.length){
      const expandidoSin = expandedFamilias.has('__sin_familia__');
      html += `<tr class="linklike-row" data-famtoggle="__sin_familia__" style="cursor:pointer;background:var(--paper);">
        <td class="mono" style="font-weight:700;">${expandidoSin?'▾':'▸'} —</td>
        <td style="font-weight:700;color:var(--rojo);">Sin familia asignada</td>
        <td>${sinFamiliaFiltrada.length} estudiante${sinFamiliaFiltrada.length!==1?'s':''}</td><td></td>
      </tr>`;
      if (expandidoSin){
        sinFamiliaFiltrada.forEach(h=>{
          html += `<tr class="linklike-row" data-c="${h.codigo}" style="cursor:pointer;">
            <td class="mono small" style="padding-left:26px;">${h.codigo}</td><td>${h.nombre}</td><td class="small">${h.nivel||''} ${h.grado||''}</td><td></td>
          </tr>`;
        });
      }
    }
    document.getElementById('fichaList').innerHTML = html || `<tr><td colspan="4" class="empty">Sin resultados</td></tr>`;

    document.querySelectorAll('[data-famtoggle]').forEach(tr=>{
      tr.onclick = ()=>{
        const key = tr.dataset.famtoggle;
        if (expandedFamilias.has(key)) expandedFamilias.delete(key); else expandedFamilias.add(key);
        drawList();
      };
    });
    document.querySelectorAll('#fichaList tr[data-c]').forEach(tr=> tr.onclick = ()=> drawDetail(tr.dataset.c));

        if (!confirm(`¿Eliminar la familia "${familia.responsable}" (${codigo})? Esta acción no se puede deshacer.`)) return;
        DB.familias = DB.familias.filter(f=>f.codigo!==codigo);
        await saveFamilias([codigo]);
        registrarAuditoria('Familia eliminada', `${codigo} · ${familia.responsable}`);
        drawList();

      </div>`:''}

      <tbody>${cuentasEst.map(c=>`<tr><td class="mono">${c.periodo}</td><td class="mono">${c.mesesAdeudados}</td><td class="mono">${fmtMoney(c.balanceAnioAnterior)}</td><td class="mono">${fmtMoney(c.balance)}</td><td class="mono" style="color:var(--verde)">${fmtMoney(totalAbonadoCuenta(c.id))}</td><td class="mono" style="font-weight:700;">${fmtMoney(balancePendiente(c))}</td><td>${c.estado}</td></tr>`).join('')||'<tr><td colspan="7" class="empty">Sin historial</td></tr>'}</tbody></table></div>
      <hr class="sep">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Historial de abonos</h2>
        ${editable && cuentasEst.length ? `<button class="btn btn-sm btn-primary" id="fichaAddAbono">+ Registrar abono</button>` : ''}
      </div>
      <div class="tablewrap" style="max-height:200px;"><table><thead><tr><th>Fecha</th><th>Periodo aplicado</th><th>Monto</th><th>Observaciones</th><th>Registrado por</th></tr></thead>
      <tbody>${abonosEst.map(a=>{ const cta = DB.cuentas.find(c=>c.id===a.cuentaId); return `<tr><td class="mono">${a.fecha}</td><td class="mono">${cta?cta.periodo:'—'}</td><td class="mono">${fmtMoney(a.monto)}</td><td class="small">${a.observaciones||''}</td><td class="small">${a.registradoPor||''}</td></tr>`; }).join('')||'<tr><td colspan="5" class="empty">Sin abonos registrados.</td></tr>'}</tbody></table></div>
      <hr class="sep">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>Historial de seguimientos</h2>
        ${editable ? `<button class="btn btn-sm btn-primary" id="fichaAddGestion">+ Registrar gestión</button>` : ''}
      </div>
      <div class="timeline">${segEst.map(s=>`<div class="tl-item"><div class="tl-date">${s.fecha} — ${s.medio}</div><div class="tl-body"><b>${s.resultado}</b><br><span class="small">${s.observaciones||''} · por ${s.creadoPor||s.responsable}</span>
        ${editable?`<div style="margin-top:6px;"><button class="btn btn-sm" data-editgestficha="${s.id}">✏ Editar</button> ${perm('eliminarRegistros')?`<button class="btn btn-sm btn-danger" data-delgestficha="${s.id}">✕ Eliminar</button>`:''}</div>`:''}
      </div></div>`).join('') || '<span class="small">Sin gestiones registradas.</span>'}</div>
    `;
    if (editable){
      const editEstBtn = document.getElementById('editEstBtn');
      if (editEstBtn) editEstBtn.onclick = ()=> openEstudianteModal(est.codigo, ()=>{ drawList(); drawDetail(est.codigo); });
      const editFamBtn = document.getElementById('editFamBtn');
      if (editFamBtn) editFamBtn.onclick = ()=> openFamiliaModal(fam.codigo, ()=>{ drawList(); drawDetail(est.codigo); });
      const delEstBtn = document.getElementById('delEstBtn');
      if (delEstBtn) delEstBtn.onclick = ()=> eliminarEstudianteCompleto(est.codigo, ()=>{
        drawList();
        document.getElementById('fichaDetail').innerHTML = '<div class="empty">Estudiante eliminado. Seleccione otra familia o estudiante.</div>';
      });
      const actAdd = document.getElementById('actAdd');
      if (actAdd) actAdd.onclick = async ()=>{
        const periodoVal = document.getElementById('actPeriodo').value.trim();
        if (!periodoVal){ alert('Indique el periodo de la actividad.'); return; }
        const nombreAct = document.getElementById('actSel').value;
        DB.estudianteActividades.push({
          id: cuid(), codigoEstudiante:est.codigo, actividad:nombreAct, periodo:periodoVal, estado:'Activa',
          costo: costoDeActividad(nombreAct), pagado:false, fechaPago:'', observaciones:''
        });
        await saveActividades();
        registrarAuditoria('Actividad inscrita', `${est.codigo} · ${nombreAct} · ${periodoVal}`);
        drawDetail(est.codigo);
      };
      root.querySelectorAll('[data-togglepago]').forEach(btn=>{
        btn.onclick = async ()=>{
          const ea = DB.estudianteActividades.find(x=>x.id===btn.dataset.togglepago);
          if (!ea) return;
          ea.pagado = !ea.pagado;
          ea.fechaPago = ea.pagado ? new Date().toISOString().slice(0,10) : '';
          await saveActividades();
          registrarAuditoria(ea.pagado?'Actividad marcada como pagada':'Actividad marcada como pendiente', `${est.codigo} · ${ea.actividad} · ${ea.periodo}`);
          drawDetail(est.codigo);
        };
      });
      root.querySelectorAll('.actCostoEdit').forEach(inp=>{
        inp.onchange = async ()=>{
          const ea = DB.estudianteActividades.find(x=>x.id===inp.dataset.id);
          if (!ea) return;
          ea.costo = Number(inp.value||0);
          await saveActividades();
          registrarAuditoria('Costo de actividad editado', `${est.codigo} · ${ea.actividad} · ${ea.periodo} · ${fmtMoney(ea.costo)}`);
        };
      });
      root.querySelectorAll('.actPeriodoEdit').forEach(inp=>{
        inp.onchange = async ()=>{
          const ea = DB.estudianteActividades.find(x=>x.id===inp.dataset.id);
          if (!ea) return;
          const nuevo = inp.value.trim();
          if (!nuevo){ alert('El periodo no puede quedar vacío.'); inp.value = ea.periodo; return; }
          ea.periodo = nuevo;
          await saveActividades();
          registrarAuditoria('Periodo de actividad editado', `${est.codigo} · ${ea.actividad} · ${nuevo}`);
        };
      });
      root.querySelectorAll('[data-delact]').forEach(btn=>{
        btn.onclick = async ()=>{
          if (!perm('eliminarRegistros')){ alert('Su rol no tiene permiso para eliminar registros. Solo el Administrador puede hacerlo.'); return; }
          const ea = DB.estudianteActividades.find(x=>x.id===btn.dataset.delact);
          if (!ea) return;
          if (!confirm(`¿Eliminar la actividad "${ea.actividad}" (${ea.periodo}) de este estudiante? Esta acción no se puede deshacer.`)) return;
          DB.estudianteActividades = DB.estudianteActividades.filter(x=>x.id!==ea.id);
          await saveActividades();
          registrarAuditoria('Actividad eliminada', `${est.codigo} · ${ea.actividad} · ${ea.periodo}`);
          drawDetail(est.codigo);
        };
      });
      const addAbonoBtn = document.getElementById('fichaAddAbono');
      if (addAbonoBtn) addAbonoBtn.onclick = ()=> openAbonoModal(cuentasEst[0].id, ()=> drawDetail(est.codigo));
      const addGestionBtn = document.getElementById('fichaAddGestion');
      if (addGestionBtn) addGestionBtn.onclick = ()=> openGestionModal(cuentasEst[0]?cuentasEst[0].id:null, ()=> drawDetail(est.codigo), est.codigo);
      root.querySelectorAll('[data-editgestficha]').forEach(btn=>{
        btn.onclick = ()=> openEditarGestionModal(btn.dataset.editgestficha, ()=> drawDetail(est.codigo));
      });
      root.querySelectorAll('[data-delgestficha]').forEach(btn=>{
        btn.onclick = ()=> eliminarGestion(btn.dataset.delgestficha, ()=> drawDetail(est.codigo));
      });
    }
  }
  search.oninput = drawList;
  const nuevaFam = document.getElementById('fNuevaFamilia');
  if (nuevaFam) nuevaFam.onclick = ()=> openFamiliaModal(null, drawList);
  const nuevoEst = document.getElementById('fNuevoEstudiante');
  if (nuevoEst) nuevoEst.onclick = ()=> openEstudianteModal(null, drawList);
  drawList();
}

function openFamiliaModal(codigoFamilia, onDone){

  root.innerHTML = `
  <div class="modal-bg" id="mbg">
    <div class="modal">
      <h3>${editing?'Editar familia':'Nueva familia'}</h3>
      <div class="formgrid">
        <div><label>Código de familia</label><input id="famCodigo" value="${editing?editing.codigo:''}" ${editing?'disabled':''} placeholder="FAM-0003"></div>
        <div><label>Nombre del responsable de pago</label><input id="famResp" value="${editing?editing.responsable:''}"></div>
        <div><label>Teléfono principal</label><input id="famTel1" value="${editing?editing.tel1:''}"></div>
        <div><label>Teléfono secundario</label><input id="famTel2" value="${editing?editing.tel2:''}"></div>
        <div><label>Correo</label><input id="famCorreo" value="${editing?editing.correo:''}"></div>
        <div><label>Estado</label><select id="famEstado"><option ${editing&&editing.estado==='Activo'?'selected':''}>Activo</option><option ${editing&&editing.estado==='Inactivo'?'selected':''}>Inactivo</option></select></div>
        <div class="full"><label>Dirección</label><input id="famDireccion" value="${editing?editing.direccion:''}"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="famCancel">Cancelar</button>
        <button class="btn btn-primary" id="famGuardar">${editing?'Guardar cambios':'Crear familia'}</button>
      </div>
    </div>
  </div>`;
  document.getElementById('mbg').onclick = (e)=>{ if(e.target.id==='mbg') closeModal(); };
  document.getElementById('famCancel').onclick = closeModal;
  document.getElementById('famGuardar').onclick = async ()=>{
    const codigo = editing ? editing.codigo : normCode(document.getElementById('famCodigo').value);
    if (!codigo){ alert('El código de familia es obligatorio.'); return; }
    if (!editing && familiaByCodigo(codigo)){ alert('Ya existe una familia con ese código.'); return; }
    const data = {
      codigo, responsable: document.getElementById('famResp').value.trim(),
      tel1: document.getElementById('famTel1').value.trim(), tel2: document.getElementById('famTel2').value.trim(),
      correo: document.getElementById('famCorreo').value.trim(), direccion: document.getElementById('famDireccion').value.trim(),
      estado: document.getElementById('famEstado').value
    };
    if (!data.responsable || !data.tel1){ alert('Nombre del responsable y teléfono principal son obligatorios.'); return; }
    if (editing){ Object.assign(editing, data); } else { DB.familias.push(data); }
    await saveFamilias();
    closeModal(); if (onDone) onDone();
  };
}

/* =========================================================================
   HISTORIAL DE SEGUIMIENTO
   ========================================================================= */
function renderHistorial(root){
  root.innerHTML = `
    <div class="toolbar">
      <div class="searchbar"><input id="hSearch" placeholder="Buscar por estudiante…"></div>
      <div class="field"><label>Responsable</label><select id="hResp"><option value="">Todos</option>${DB.catalogos.responsables.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Medio</label><select id="hMedio"><option value="">Todos</option>${DB.catalogos.mediosContacto.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Resultado</label><select id="hResultado"><option value="">Todos</option>${DB.catalogos.resultadosGestion.map(r=>`<option>${r}</option>`).join('')}</select></div>
      <div class="field"><label>&nbsp;</label><button class="btn" id="hExport">⭳ Exportar historial</button></div>
    </div>
    <div class="tablewrap"><table><thead><tr><th>Fecha</th><th>Estudiante</th><th>Familia</th><th>Responsable</th><th>Medio</th><th>Resultado</th><th>Próxima gestión</th><th>Observaciones</th><th>Registrado por</th><th></th></tr></thead><tbody id="hBody"></tbody></table></div>
  `;
  const puedeEditar = perm('editarFicha');
  let filasActuales = [];
  const draw = ()=>{
    const q = (document.getElementById('hSearch').value||'').toLowerCase();
    const resp = document.getElementById('hResp').value, medio = document.getElementById('hMedio').value, resultado = document.getElementById('hResultado').value;
    let rows = [...DB.seguimientos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
    if (q) rows = rows.filter(s=>{ const est = estudianteByCodigo(s.codigoEstudiante); return (est&&est.nombre.toLowerCase().includes(q)) || s.codigoEstudiante.toLowerCase().includes(q); });
    if (resp) rows = rows.filter(s=>s.responsable===resp);
    if (medio) rows = rows.filter(s=>s.medio===medio);
    if (resultado) rows = rows.filter(s=>s.resultado===resultado);
    filasActuales = rows;
    document.getElementById('hBody').innerHTML = rows.map(s=>{
      const est = estudianteByCodigo(s.codigoEstudiante);
      const fam = est ? familiaByCodigo(est.codigoFamilia) : null;
      return `<tr><td class="mono">${s.fecha}</td><td>${est?est.nombre:s.codigoEstudiante}</td><td>${fam?fam.responsable:''}</td><td>${s.responsable}</td><td>${s.medio}</td><td>${s.resultado}</td><td class="mono">${s.proximaGestion||'—'}</td><td class="small">${s.observaciones||''}</td><td class="small">${s.creadoPor||''}</td>
        <td style="white-space:nowrap;">
          ${puedeEditar?`<button class="btn btn-sm" data-editgest="${s.id}">✏</button>`:''}
          ${perm('eliminarRegistros')?`<button class="btn btn-sm btn-danger" data-delgest="${s.id}">✕</button>`:''}
        </td>
      </tr>`;
    }).join('') || `<tr><td colspan="10" class="empty">Sin gestiones registradas.</td></tr>`;
    root.querySelectorAll('[data-editgest]').forEach(btn=>{
      btn.onclick = ()=> openEditarGestionModal(btn.dataset.editgest, draw);
    });
    root.querySelectorAll('[data-delgest]').forEach(btn=>{
      btn.onclick = ()=> eliminarGestion(btn.dataset.delgest, draw);
    });
  };
  ['hSearch','hResp','hMedio','hResultado'].forEach(id=>{
    const el = document.getElementById(id); el.addEventListener(id==='hSearch'?'input':'change', draw);
  });
  document.getElementById('hExport').onclick = ()=> exportCSV(filasActuales.map(s=>{
    const est = estudianteByCodigo(s.codigoEstudiante);
    const fam = est ? familiaByCodigo(est.codigoFamilia) : null;
    return {
      Fecha:s.fecha, Codigo_Estudiante:s.codigoEstudiante, Estudiante:est?est.nombre:'', Familia:fam?fam.responsable:'',
      Responsable:s.responsable, Medio:s.medio, Resultado:s.resultado, Proxima_Gestion:s.proximaGestion||'',
      Observaciones:s.observaciones||'', Registrado_Por:s.creadoPor||''
    };
  }), `historial_seguimiento_${new Date().toISOString().slice(0,10)}.csv`);
  draw();
}

          <td>${canEdit?`<input type="number" min="0" step="0.01" data-actcosto="${i}" value="${a.costo}" style="border:1px solid var(--line);border-radius:6px;padding:5px 7px;width:110px;">`:fmtMoney(a.costo)}</td>

      </div>
      ${canEdit?`<div class="addrow"><input id="nuevaActNombre" placeholder="Nombre de la actividad"><input id="nuevaActCosto" type="number" min="0" step="0.01" placeholder="Costo" style="max-width:120px;"><button class="btn btn-sm" id="nuevaActBtn">Agregar actividad</button></div>`:''}
    </div>
    <div class="grid grid-2">
      ${CAT_META.map(m=>`
        <div class="card">
          <h2>${m.label}</h2>
          <div class="catlist">${DB.catalogos[m.key].map((v,i)=>`<span class="cattag">${v} ${canEdit?`<button data-cat="${m.key}" data-i="${i}">×</button>`:''}</span>`).join('')}</div>
          ${canEdit?`<div class="addrow"><input placeholder="Agregar nuevo…" data-add="${m.key}"><button class="btn btn-sm" data-addbtn="${m.key}">Agregar</button></div>`:''}
        </div>`).join('')}
    </div>`;

  });
  root.querySelectorAll('[data-actcosto]').forEach(inp=>{

  });
  root.querySelectorAll('[data-actdel]').forEach(btn=>{
    btn.onclick = async ()=>{
      if (!confirm('¿Eliminar esta actividad del catálogo? Los estudiantes ya inscritos conservan su registro histórico.')) return;
      DB.catalogos.actividades.splice(Number(btn.dataset.actdel),1);
      await saveCatalogos(); renderCatalogos(root);
    };
  });
  const nuevaActBtn = document.getElementById('nuevaActBtn');
  if (nuevaActBtn) nuevaActBtn.onclick = async ()=>{

    btn.onclick = async ()=>{ DB.catalogos[btn.dataset.cat].splice(Number(btn.dataset.i),1); await saveCatalogos(); renderCatalogos(root); };
  });
  root.querySelectorAll('[data-addbtn]').forEach(btn=>{
    btn.onclick = async ()=>{
      const input = root.querySelector(`[data-add="${btn.dataset.addbtn}"]`);
      if (input.value.trim()){ DB.catalogos[btn.dataset.addbtn].push(input.value.trim()); await saveCatalogos(); renderCatalogos(root); }
    };
  });
}

function renderUsuarios(root){
  root.innerHTML = `
    <div class="card">
      <h2>Usuarios del sistema</h2>
      <p class="small">Cada usuario inicia sesión con su <b>correo y contraseña</b>. Roles: <b>Administrador</b> (acceso total), <b>Contable</b> (gestión y reportes, sin catálogos ni usuarios) o <b>Auxiliar</b> (consulta y registro de gestiones propias).</p>
      <div class="note">Este sistema no tiene servidor de correo, por lo que no puede enviar enlaces de recuperación por email. Cada usuario puede recuperar su propia clave respondiendo su <b>pregunta de seguridad</b> en la pantalla de inicio de sesión. Si la olvida también, un Administrador puede restablecerla aquí manualmente. Tras ${MAX_INTENTOS_FALLIDOS} intentos fallidos, la cuenta se bloquea sola por ${BLOQUEO_MINUTOS} minutos.</div>
      <div class="tablewrap" style="max-height:360px;">
        <table><thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Último acceso</th><th></th></tr></thead>
        <tbody>${DB.usuarios.map((u,i)=>{
          const bloqueado = u.bloqueadoHasta && new Date(u.bloqueadoHasta) > new Date();
          return `<tr>
          <td>${u.nombre}${u.correo===SESSION.correo?' <span class="small">(usted)</span>':''}</td>
          <td class="mono">${u.correo}</td>
          <td><select data-ur="${i}" ${u.correo===SESSION.correo?'disabled title="No puede cambiarse su propio rol"':''}>
            <option value="admin" ${u.rol==='admin'?'selected':''}>Administrador</option>
            <option value="contable" ${u.rol==='contable'?'selected':''}>Contable</option>
            <option value="auxiliar" ${u.rol==='auxiliar'?'selected':''}>Auxiliar</option>
          </select></td>
          <td>${bloqueado?`<span class="pill-error">Bloqueada</span>`:`<span class="pill-ok">Activa</span>`}</td>
          <td class="small mono">${u.ultimoAcceso ? new Date(u.ultimoAcceso).toLocaleString('es-DO') : 'Nunca'}</td>
          <td style="white-space:nowrap;">
            <button class="btn btn-sm" data-ureset="${i}">Restablecer clave</button>
            <button class="btn btn-sm btn-danger" data-udel="${i}" ${u.correo===SESSION.correo?'disabled title="No puede eliminar su propia cuenta"':''}>Eliminar</button>
          </td>
        </tr>`;}).join('')}</tbody></table>
      </div>
      <hr class="sep">
      <h2>Agregar nuevo usuario</h2>
      <div class="formgrid" style="max-width:640px;">
        <div><label>Nombre completo</label><input id="newUserName" placeholder="Nombre y apellido"></div>
        <div><label>Correo electrónico</label><input id="newUserEmail" type="email" placeholder="nombre@sunegocio.com"></div>
        <div><label>Rol</label><select id="newUserRole"><option value="admin">Administrador</option><option value="contable" selected>Contable</option><option value="auxiliar">Auxiliar</option></select></div>
        <div><label>Contraseña inicial</label><input id="newUserPass" type="text" placeholder="Mínimo 6 caracteres"></div>
        <div><label>Pregunta de seguridad</label><input id="newUserPregunta" placeholder="Ej. ¿Nombre de su primera mascota?"></div>
        <div><label>Respuesta de seguridad</label><input id="newUserRespuesta" placeholder="Respuesta"></div>
      </div>
      <div style="margin-top:12px;"><button class="btn btn-primary" id="addUser">Agregar usuario</button></div>
    </div>
  `;
  root.querySelectorAll('[data-ur]').forEach(sel=> sel.onchange = async ()=>{
    const u = DB.usuarios[Number(sel.dataset.ur)];
    const antes = u.rol;
    u.rol = sel.value; await saveUsuarios();
    registrarAuditoria('Rol de usuario cambiado', `${u.correo}: ${ROLE_LABEL[antes]} → ${ROLE_LABEL[u.rol]}`);
    renderUsuarios(root);
  });
  root.querySelectorAll('[data-udel]').forEach(btn=> btn.onclick = async ()=>{
    if (!confirm('¿Eliminar este usuario? Ya no podrá iniciar sesión.')) return;
    const u = DB.usuarios[Number(btn.dataset.udel)];
    DB.usuarios.splice(Number(btn.dataset.udel),1); await saveUsuarios();
    registrarAuditoria('Usuario eliminado', u ? u.correo : '');
    renderUsuarios(root);
  });
  root.querySelectorAll('[data-ureset]').forEach(btn=> btn.onclick = async ()=>{
    const u = DB.usuarios[Number(btn.dataset.ureset)];
    const nueva = prompt(`Nueva contraseña temporal para ${u.nombre} (${u.correo}):\n(mínimo 6 caracteres — compártala con la persona por un medio seguro)`);
    if (!nueva) return;
    if (nueva.trim().length < 6){ alert('La contraseña debe tener al menos 6 caracteres.'); return; }
    u.passwordHash = await hashText(nueva.trim());
    u.intentosFallidos = 0; u.bloqueadoHasta = null;
    await saveUsuarios();
    registrarAuditoria('Contraseña restablecida por Administrador', u.correo);
    alert(`Contraseña restablecida para ${u.nombre}. Compártasela de forma segura.`);
  });
  document.getElementById('addUser').onclick = async ()=>{
    const nombre = document.getElementById('newUserName').value.trim();
    const correo = document.getElementById('newUserEmail').value.trim().toLowerCase();
    const rol = document.getElementById('newUserRole').value;
    const pass = document.getElementById('newUserPass').value;
    const pregunta = document.getElementById('newUserPregunta').value.trim();
    const respuesta = document.getElementById('newUserRespuesta').value.trim();
    if (!nombre || !correo || !pass || !pregunta || !respuesta){ alert('Complete todos los campos.'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)){ alert('Ingrese un correo electrónico válido.'); return; }
    if (DB.usuarios.some(u=>u.correo.toLowerCase()===correo)){ alert('Ya existe un usuario con ese correo.'); return; }
    if (pass.length < 6){ alert('La contraseña debe tener al menos 6 caracteres.'); return; }
    DB.usuarios.push({
      nombre, correo, rol, passwordHash: await hashText(pass), pregunta, respuestaHash: await hashText(respuesta),
      intentosFallidos:0, bloqueadoHasta:null, ultimoAcceso:null, creadoEl:new Date().toISOString()
    });
    await saveUsuarios();
    registrarAuditoria('Usuario creado', `${correo} (${ROLE_LABEL[rol]})`);
    renderUsuarios(root);
  };
}

function renderAuditoria(root){
  root.innerHTML = `
    <div class="note">Registro de solo lectura: inicios de sesión (éxitos y fallos), bloqueos de cuenta, altas/bajas/cambios de datos, importaciones y restauraciones. Se conservan los últimos 1000 eventos.</div>
    <div class="toolbar">
      <div class="searchbar"><input id="audSearch" placeholder="Buscar por usuario, acción o detalle…"></div>
    </div>
    <div class="tablewrap" style="max-height:600px;">
      <table><thead><tr><th>Fecha y hora</th><th>Usuario</th><th>Acción</th><th>Detalle</th></tr></thead><tbody id="audBody"></tbody></table>
    </div>
  `;
  const draw = ()=>{
    const q = (document.getElementById('audSearch').value||'').toLowerCase();
    let rows = [...DB.auditoria].sort((a,b)=> b.fecha.localeCompare(a.fecha));
    if (q) rows = rows.filter(r=> (r.usuario||'').toLowerCase().includes(q) || (r.accion||'').toLowerCase().includes(q) || (r.detalle||'').toLowerCase().includes(q));
    document.getElementById('audBody').innerHTML = rows.slice(0,500).map(r=>`<tr>
      <td class="mono small">${new Date(r.fecha).toLocaleString('es-DO')}</td>
      <td class="small">${r.usuario}</td>
      <td>${r.accion}</td>
      <td class="small">${r.detalle||''}</td>
    </tr>`).join('') || `<tr><td colspan="4" class="empty">Sin actividad registrada todavía.</td></tr>`;
  };
  document.getElementById('audSearch').addEventListener('input', draw);
  draw();
}

      funcionando con Nube de Claude.ai / IndexedDB / localStorage como hasta ahora.

          <b>Motivo técnico:</b> ${STORAGE_DIAG.supabaseIntentado ? (STORAGE_DIAG.detalle || 'Se probó la conexión pero no se pudo confirmar la escritura/lectura (sin mensaje de error específico).') : 'No se llegó a intentar la conexión con estos datos guardados (revise que el Project URL y la anon key sean correctos).'}

        <div class="full"><label>Anon / Public key</label><input id="sbKey" placeholder="eyJhbGciOi..." value="${SUPABASE_ANON_KEY||''}"></div>
      </div>
      <div id="sbTestMsg" style="margin-top:10px;"></div>

      <p class="small" style="margin-top:12px;">Antes de conectar, cree su proyecto gratis en <span class="mono">supabase.com</span> y ejecute el script SQL de la tabla <span class="mono">kv_store</span> que aparece en la guía de arquitectura (sección "Ruta recomendada"). La anon key es pública por diseño — está protegida por las reglas de seguridad (RLS) que usted define en Supabase, no es un secreto que deba ocultar del navegador.</p>
    </div>
  `;
  const btnReintentar = document.getElementById('sbReintentar');
  if (btnReintentar) btnReintentar.onclick = async ()=>{
    btnReintentar.textContent = 'Reintentando…';
    await verificarAlmacenamiento();
    await recargarDatosDeNegocio();
    renderAll();
  };
  document.getElementById('sbProbar').onclick = async ()=>{
    const url = document.getElementById('sbUrl').value;
    const key = document.getElementById('sbKey').value;
    const msg = document.getElementById('sbTestMsg');
    msg.innerHTML = `<p class="small">Probando…</p>`;
    const r = await supabaseProbar(url, key);
    msg.innerHTML = r.ok
      ? `<div class="note">✓ Conexión exitosa. La tabla "kv_store" respondió correctamente.</div>`
      : `<div class="alertbox">${r.error}</div>`;
  };
  document.getElementById('sbGuardar').onclick = async ()=>{
    const url = document.getElementById('sbUrl').value;
    const key = document.getElementById('sbKey').value;
    if (!url.trim() || !key.trim()){ alert('Complete el Project URL y la anon key.'); return; }
    if ((DB.familias.length > 0 || DB.estudiantes.length > 0) && STORAGE_MODE !== 'supabase'){
      const seguir = confirm(
        'Ya tiene datos guardados (familias, estudiantes, etc.) en su almacenamiento actual.\n\n' +
        'Al conectar Supabase, la app empieza a leer y escribir en esa base de datos — que probablemente esté vacía si es un proyecto nuevo. Sus datos actuales de negocio (familias, cuentas, abonos) NO se mueven solos, pero SU CUENTA DE USUARIO SÍ se trasladará automáticamente para que pueda seguir entrando.\n\n' +
        'Recomendado: cancele, vaya a "Respaldo de Datos" y exporte un respaldo (.json) ANTES de continuar. Luego conecte Supabase y restaure ese respaldo desde "Respaldo de Datos" para migrar todo de una vez.\n\n' +
        '¿Desea continuar de todas formas sin exportar primero?'
      );
      if (!seguir) return;
    }
    const r = await supabaseProbar(url, key);
    if (!r.ok){
      if (!confirm('La prueba de conexión falló: ' + r.error + '\n\n¿Guardar de todas formas? (puede corregirlo después)')) return;
    }
    const usuariosLocalesPrevios = DB.usuarios.slice();
    await guardarConfigSupabase(url, key);
    await verificarAlmacenamiento();
    await recargarDatosDeNegocio();
    // Si es la primera vez que se conecta este proyecto (todavía no tiene usuarios),
    // se lleva la(s) cuenta(s) local(es) — típicamente el Administrador que acaba de conectar —
    // para que quede sembrada la base compartida y otros dispositivos puedan iniciar sesión.
    let usuariosMigrados = 0;
    if (DB.usuarios.length === 0 && usuariosLocalesPrevios.length > 0){
      DB.usuarios = usuariosLocalesPrevios;
      await saveUsuarios();
      usuariosMigrados = usuariosLocalesPrevios.length;
    }
    registrarAuditoria('Base de datos Supabase configurada', url + (usuariosMigrados ? ` · ${usuariosMigrados} cuenta(s) de usuario migradas` : ''));
    renderAll();
  };
  const btnDesc = document.getElementById('sbDesconectar');
  if (btnDesc) btnDesc.onclick = async ()=>{
    if (!confirm('¿Desconectar Supabase? La app volverá a usar Nube de Claude.ai / IndexedDB / localStorage — que puede tener datos distintos a los de Supabase. Sus datos en Supabase NO se borran, solo deja de usarlos esta app.')) return;
    await borrarConfigSupabase();
    await verificarAlmacenamiento();
    await recargarDatosDeNegocio();
    registrarAuditoria('Base de datos Supabase desconectada', '');
    renderAll();
  };
}

  document.getElementById('btnExportar').onclick = exportBackup;
  const btnReprobar = document.getElementById('btnReprobar');
  if (btnReprobar) btnReprobar.onclick = async ()=>{
    btnReprobar.textContent = 'Probando…';
    await verificarAlmacenamiento();
    await recargarDatosDeNegocio();
    renderAll();
  };
  const btnLimpiar = document.getElementById('btnLimpiarDemo');
  if (btnLimpiar) btnLimpiar.onclick = async ()=>{
    if (!confirm('¿Eliminar todos los datos de muestra? Esta acción no se puede deshacer. Los datos reales que ya hayas cargado no se verán afectados.')) return;
    await eliminarDatosDemo();
    renderRespaldo(root);
  };
  document.getElementById('btnVaciarTodo').onclick = async ()=>{
    const ok = await vaciarTodosLosDatos();
    if (ok) renderRespaldo(root);
  };
  document.getElementById('fileRestaurar').onchange = (e)=>{
    const file = e.target.files[0];
    if (!file) return;
    if (!confirm('Esto reemplazará TODOS los datos actuales por los del archivo de respaldo. ¿Continuar?')) { e.target.value=''; return; }
    importBackupFile(file, ()=>{
      document.getElementById('restaurarMsg').innerHTML = `<div class="note" style="margin-top:10px;">Respaldo restaurado correctamente.</div>`;
      renderAll();
    }, (err)=>{
      document.getElementById('restaurarMsg').innerHTML = `<div class="alertbox" style="margin-top:10px;">No se pudo restaurar: ${err.message}</div>`;
    });
  };
}

/* =========================================================================
   AUTENTICACIÓN — LOGIN OBLIGATORIO, BLOQUEO POR INTENTOS FALLIDOS,
   ASISTENTE DE PRIMER USO Y CIERRE DE SESIÓN POR INACTIVIDAD
   ========================================================================= */
const MAX_INTENTOS_FALLIDOS = 5;
const BLOQUEO_MINUTOS = 5;
const INACTIVIDAD_MINUTOS = 30;
let loginState = { step:'login', error:'', ok:'', pendingUser:null };
let idleTimer = null;

function iniciarControlDeInactividad(){
  const resetTimer = ()=>{
    if (idleTimer) clearTimeout(idleTimer);
    if (!SESSION.authenticated) return;
    idleTimer = setTimeout(()=>{
      registrarAuditoria('Cierre de sesión automático', 'Por inactividad (' + INACTIVIDAD_MINUTOS + ' min)');
      cerrarSesion('Su sesión se cerró automáticamente por inactividad (' + INACTIVIDAD_MINUTOS + ' minutos). Vuelva a iniciar sesión.');
    }, INACTIVIDAD_MINUTOS * 60 * 1000);
  };
  ['click','keydown','mousemove','scroll'].forEach(ev=> document.addEventListener(ev, resetTimer, {passive:true}));
  resetTimer();
}

function cerrarSesion(mensaje){
  if (SESSION.authenticated) registrarAuditoria('Cierre de sesión', SESSION.correo||SESSION.usuario||'');
  SESSION = { usuario:null, rol:null, correo:null, authenticated:false };
  currentView = 'dashboard';
  loginState = { step: DB.usuarios.length===0 ? 'setup-admin' : 'login', error:'', ok: mensaje||'', pendingUser:null };
  document.querySelector('.app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  renderLogin();
}

async function eliminarTodosLosUsuarios(){
  // Protección crítica: si el almacenamiento activo es compartido (Supabase o la nube de Claude.ai),
  // esta acción borraría las cuentas de TODO el equipo, desde cualquier dispositivo, sin ninguna
  // credencial. Por eso queda deshabilitada por completo en modo compartido — ver mensaje en pantalla.
  if (STORAGE_MODE === 'supabase' || STORAGE_MODE === 'cloud'){
    alert('Esta opción está deshabilitada porque este dispositivo está conectado a una base de datos compartida con su equipo. Borrar usuarios aquí afectaría a todos, no solo a este dispositivo.\n\nSi de verdad perdió el acceso a todas las cuentas, pida a la persona que administra ' + (STORAGE_MODE==='supabase' ? 'el proyecto de Supabase' : 'Claude.ai') + ' que elimine manualmente la cuenta afectada, o restaure un respaldo (.json) desde otro dispositivo que sí tenga sesión activa.');
    return;
  }
  const frase = prompt('Esto eliminará TODAS las cuentas de usuario guardadas EN ESTE DISPOSITIVO. La próxima vez que se abra la app aquí, se pedirá crear una cuenta de Administrador desde cero.\n\nEsta acción no se puede deshacer.\n\nPara confirmar, escriba exactamente: ELIMINAR');
  if (frase !== 'ELIMINAR') { if (frase !== null) alert('No coincide con "ELIMINAR". No se hizo ningún cambio.'); return; }
  DB.usuarios = [];
  await saveUsuarios();
  registrarAuditoria('Reinicio de usuarios', 'Se eliminaron todas las cuentas locales desde la pantalla de acceso.');
  loginState = { step:'setup-admin', error:'', ok:'', pendingUser:null };
  renderLogin();
}

function renderLogin(){
  const box = document.getElementById('loginScreen');
  const s = loginState;
  const shell = (inner)=>`
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">CC</div>
        <div><div>Cuentas Críticas</div><div>Gestión de Cobros — Dirección</div></div>
      </div>
      ${inner}
    </div>`;

  /* ---------- Asistente de primer uso: crear el Administrador real ---------- */
  if (s.step === 'setup-admin'){
    box.innerHTML = shell(`
      <h2>Configuración inicial</h2>
      <p class="sub">Todavía no hay ninguna cuenta creada en este dispositivo. Cree la cuenta del <b>Administrador</b> — será quien pueda crear al resto del equipo después.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      <div class="login-field"><label>Nombre completo</label><input type="text" id="suNombre" placeholder="Nombre y apellido"></div>
      <div class="login-field"><label>Correo electrónico</label><input type="email" id="suCorreo" placeholder="nombre@sunegocio.com"></div>
      <div class="login-field"><label>Contraseña</label><input type="password" id="suPass" placeholder="Mínimo 6 caracteres"></div>
      <div class="login-field"><label>Confirmar contraseña</label><input type="password" id="suPass2" placeholder="Repita la contraseña"></div>
      <div class="login-field"><label>Pregunta de seguridad</label><input type="text" id="suPregunta" placeholder="Ej. ¿Nombre de su primera mascota?"></div>
      <div class="login-field"><label>Respuesta de seguridad</label><input type="text" id="suRespuesta" placeholder="Respuesta"></div>
      <div class="login-actions"><button class="btn btn-primary" id="suSubmit">Crear cuenta e ingresar</button></div>
      <div class="login-note">Esta será la única cuenta con acceso total al inicio. Desde "Usuarios y Roles" podrá crear las demás cuentas del equipo (Contable, Auxiliar) una vez adentro.</div>
      <div class="login-link" id="loIrConectarBD" style="margin-top:14px;">¿Su equipo ya tiene una base de datos configurada (Supabase)? Conectar en vez de crear una cuenta nueva</div>
    `);
    document.getElementById('loIrConectarBD').onclick = ()=>{ loginState = { step:'conectar-bd', error:'', ok:'', pendingUser:null, volverA:'setup-admin' }; renderLogin(); };
    document.getElementById('suSubmit').onclick = async ()=>{
      const nombre = document.getElementById('suNombre').value.trim();
      const correo = document.getElementById('suCorreo').value.trim().toLowerCase();
      const pass = document.getElementById('suPass').value;
      const pass2 = document.getElementById('suPass2').value;
      const pregunta = document.getElementById('suPregunta').value.trim();
      const respuesta = document.getElementById('suRespuesta').value.trim();
      if (!nombre || !correo || !pass || !pregunta || !respuesta){ loginState.error='Complete todos los campos.'; renderLogin(); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)){ loginState.error='Ingrese un correo electrónico válido.'; renderLogin(); return; }
      if (pass.length < 6){ loginState.error='La contraseña debe tener al menos 6 caracteres.'; renderLogin(); return; }
      if (pass !== pass2){ loginState.error='Las contraseñas no coinciden.'; renderLogin(); return; }
      const nuevoAdmin = {
        nombre, correo, rol:'admin', passwordHash: await hashText(pass), pregunta, respuestaHash: await hashText(respuesta),
        intentosFallidos:0, bloqueadoHasta:null, ultimoAcceso:new Date().toISOString(), creadoEl:new Date().toISOString()
      };
      DB.usuarios.push(nuevoAdmin);
      await saveUsuarios();
      registrarAuditoria('Configuración inicial', 'Cuenta de Administrador creada: ' + correo);
      SESSION = { usuario:nuevoAdmin.nombre, rol:'admin', correo:nuevoAdmin.correo, authenticated:true };
      loginState = { step:'login', error:'', ok:'', pendingUser:null };
      document.getElementById('loginScreen').style.display = 'none';
      document.querySelector('.app').style.display = 'grid';
      currentView = 'dashboard';
      renderAll();
      iniciarControlDeInactividad();
    };
    return;
  }

  if (s.step === 'conectar-bd'){
    box.innerHTML = shell(`
      <span class="login-back" id="loBack">← Volver</span>
      <h2>Conectar a una base de datos existente</h2>
      <p class="sub">Si otro miembro de su equipo ya conectó este sistema a un proyecto de Supabase, ingrese aquí los mismos datos para ver las mismas cuentas y la misma información.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      <div class="login-field"><label>Project URL</label><input type="text" id="cbUrl" placeholder="https://xxxxxxxx.supabase.co"></div>
      <div class="login-field"><label>Anon / Public key</label><input type="text" id="cbKey" placeholder="eyJhbGciOi..."></div>
      <div class="login-actions"><button class="btn btn-primary" id="cbConectar">Conectar</button></div>
      <div class="login-note">Pídale estos dos datos al Administrador que configuró Supabase la primera vez — están en "Base de Datos (Supabase)" dentro de la app.</div>
    `);
    document.getElementById('loBack').onclick = ()=>{ loginState = { step: s.volverA || 'login', error:'', ok:'', pendingUser:null }; renderLogin(); };
    document.getElementById('cbConectar').onclick = async ()=>{
      const url = document.getElementById('cbUrl').value;
      const key = document.getElementById('cbKey').value;
      if (!url.trim() || !key.trim()){ loginState.error='Complete el Project URL y la anon key.'; renderLogin(); return; }
      const btn = document.getElementById('cbConectar'); btn.textContent = 'Conectando…'; btn.disabled = true;
      const r = await supabaseProbar(url, key);
      if (!r.ok){ loginState.error = r.error; renderLogin(); return; }
      await guardarConfigSupabase(url, key);
      await verificarAlmacenamiento();
      await recargarDatosDeNegocio();
      loginState = { step: DB.usuarios.length===0 ? 'setup-admin' : 'login', error:'', ok:'Conectado. Ahora puede iniciar sesión con las cuentas de su equipo.', pendingUser:null };
      renderLogin();
    };
    return;
  }

  if (s.step === 'login'){
    box.innerHTML = shell(`
      <h2>Iniciar sesión</h2>
      <p class="sub">Ingrese con su correo y contraseña.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      ${s.ok?`<div class="login-ok">${s.ok}</div>`:''}
      <div class="login-field"><label>Correo electrónico</label><input type="email" id="loEmail" placeholder="nombre@sunegocio.com" autocomplete="username"></div>
      <div class="login-field"><label>Contraseña</label><input type="password" id="loPass" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="login-actions"><button class="btn btn-primary" id="loSubmit">Ingresar</button></div>
      <div class="login-link" id="loForgot">¿Olvidó su contraseña?</div>
      <div class="login-note">La clave se recupera respondiendo su pregunta de seguridad. Este sistema no envía correos reales (no cuenta con servidor de correo).</div>
      ${(STORAGE_MODE === 'supabase' || STORAGE_MODE === 'cloud')
        ? `<div class="login-note" style="margin-top:10px;">¿Perdió el acceso a todas las cuentas de su equipo? Pida a quien administra ${STORAGE_MODE==='supabase'?'el proyecto de Supabase':'Claude.ai'} que la recupere — por seguridad, esta opción no puede hacerse desde aquí cuando los datos son compartidos.</div>`
        : `<div class="login-link" id="loFactoryReset" style="color:var(--rojo);margin-top:10px;">¿Perdió el acceso a todas las cuentas de este dispositivo? Reiniciar usuarios locales</div>`
      }
      <div class="login-link" id="loIrConectarBD2" style="margin-top:10px;">¿Necesita conectarse a la base de datos de su equipo (Supabase)?</div>
    `);
    document.getElementById('loIrConectarBD2').onclick = ()=>{ loginState = { step:'conectar-bd', error:'', ok:'', pendingUser:null, volverA:'login' }; renderLogin(); };
    const submit = async ()=>{
      const email = (document.getElementById('loEmail').value||'').trim().toLowerCase();
      const pass = document.getElementById('loPass').value||'';
      if (!email || !pass){ loginState.error = 'Ingrese correo y contraseña.'; loginState.ok=''; renderLogin(); return; }
      const user = DB.usuarios.find(u=>u.correo.toLowerCase()===email);
      if (!user){ loginState.error = 'No existe una cuenta con ese correo.'; loginState.ok=''; renderLogin(); return; }

      if (user.bloqueadoHasta && new Date(user.bloqueadoHasta) > new Date()){
        const minutosRestantes = Math.ceil((new Date(user.bloqueadoHasta) - new Date())/60000);
        loginState.error = `Esta cuenta está bloqueada temporalmente por demasiados intentos fallidos. Intente de nuevo en ${minutosRestantes} minuto(s), o recupere su clave con la pregunta de seguridad.`;
        loginState.ok=''; renderLogin(); return;
      }

      const hash = await hashText(pass);
      if (hash !== user.passwordHash){
        user.intentosFallidos = (user.intentosFallidos||0) + 1;
        let msg = 'Contraseña incorrecta.';
        if (user.intentosFallidos >= MAX_INTENTOS_FALLIDOS){
          user.bloqueadoHasta = new Date(Date.now() + BLOQUEO_MINUTOS*60000).toISOString();
          user.intentosFallidos = 0;
          msg = `Demasiados intentos fallidos. Esta cuenta quedó bloqueada por ${BLOQUEO_MINUTOS} minutos.`;
          registrarAuditoria('Cuenta bloqueada', email + ' — ' + MAX_INTENTOS_FALLIDOS + ' intentos fallidos');
        } else {
          registrarAuditoria('Intento de acceso fallido', email + ` (intento ${user.intentosFallidos}/${MAX_INTENTOS_FALLIDOS})`);
        }
        await saveUsuarios();
        loginState.error = msg; loginState.ok=''; renderLogin(); return;
      }

      user.intentosFallidos = 0; user.bloqueadoHasta = null; user.ultimoAcceso = new Date().toISOString();
      await saveUsuarios();
      registrarAuditoria('Inicio de sesión', user.correo);
      SESSION = { usuario:user.nombre, rol:user.rol, correo:user.correo, authenticated:true };
      loginState = { step:'login', error:'', ok:'', pendingUser:null };
      document.getElementById('loginScreen').style.display = 'none';
      document.querySelector('.app').style.display = 'grid';
      currentView = 'dashboard';
      renderAll();
      iniciarControlDeInactividad();
    };
    document.getElementById('loSubmit').onclick = submit;
    box.querySelectorAll('input').forEach(inp=> inp.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); }));
    document.getElementById('loForgot').onclick = ()=>{ loginState = {step:'forgot-email', error:'', ok:'', pendingUser:null}; renderLogin(); };
    const btnFactoryReset = document.getElementById('loFactoryReset');
    if (btnFactoryReset) btnFactoryReset.onclick = eliminarTodosLosUsuarios;
  }

  else if (s.step === 'forgot-email'){
    box.innerHTML = shell(`
      <span class="login-back" id="loBack">← Volver a iniciar sesión</span>
      <h2>Recuperar contraseña</h2>
      <p class="sub">Ingrese su correo para ver su pregunta de seguridad.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      <div class="login-field"><label>Correo electrónico</label><input type="email" id="frEmail" placeholder="nombre@sunegocio.com"></div>
      <div class="login-actions"><button class="btn btn-primary" id="frSubmit">Continuar</button></div>
    `);
    document.getElementById('loBack').onclick = ()=>{ loginState = {step:'login', error:'', ok:'', pendingUser:null}; renderLogin(); };
    document.getElementById('frSubmit').onclick = ()=>{
      const email = (document.getElementById('frEmail').value||'').trim().toLowerCase();
      const user = DB.usuarios.find(u=>u.correo.toLowerCase()===email);
      if (!user){ loginState.error = 'No existe una cuenta con ese correo.'; renderLogin(); return; }
      loginState = { step:'forgot-question', error:'', ok:'', pendingUser:user };
      renderLogin();
    };
  }

  else if (s.step === 'forgot-question'){
    const user = s.pendingUser;
    box.innerHTML = shell(`
      <span class="login-back" id="loBack">← Volver a iniciar sesión</span>
      <h2>Pregunta de seguridad</h2>
      <p class="sub">Responda la pregunta configurada para <b>${user.correo}</b>.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      <div class="login-field"><label>${user.pregunta}</label><input type="text" id="frResp" placeholder="Su respuesta"></div>
      <div class="login-actions"><button class="btn btn-primary" id="frCheck">Verificar respuesta</button></div>
    `);
    document.getElementById('loBack').onclick = ()=>{ loginState = {step:'login', error:'', ok:'', pendingUser:null}; renderLogin(); };
    document.getElementById('frCheck').onclick = async ()=>{
      const resp = document.getElementById('frResp').value||'';
      const hash = await hashText(resp);
      if (hash !== user.respuestaHash){ loginState.error = 'La respuesta no coincide. Intente de nuevo o pida a un Administrador que restablezca su clave.'; renderLogin(); return; }
      loginState = { step:'forgot-reset', error:'', ok:'', pendingUser:user };
      renderLogin();
    };
  }

  else if (s.step === 'forgot-reset'){
    const user = s.pendingUser;
    box.innerHTML = shell(`
      <h2>Nueva contraseña</h2>
      <p class="sub">Cree una nueva contraseña para <b>${user.correo}</b>. Al guardarla entrará directo al sistema.</p>
      ${s.error?`<div class="login-error">${s.error}</div>`:''}
      <div class="login-field"><label>Nueva contraseña</label><input type="password" id="frNewPass" placeholder="Mínimo 6 caracteres"></div>
      <div class="login-field"><label>Confirmar contraseña</label><input type="password" id="frNewPass2" placeholder="Repita la contraseña"></div>
      <div class="login-actions"><button class="btn btn-primary" id="frSave">Guardar y entrar</button></div>
    `);
    document.getElementById('frSave').onclick = async ()=>{
      const p1 = document.getElementById('frNewPass').value||'';
      const p2 = document.getElementById('frNewPass2').value||'';
      if (p1.length < 6){ loginState.error = 'La contraseña debe tener al menos 6 caracteres.'; renderLogin(); return; }
      if (p1 !== p2){ loginState.error = 'Las contraseñas no coinciden.'; renderLogin(); return; }
      user.passwordHash = await hashText(p1);
      user.intentosFallidos = 0; user.bloqueadoHasta = null; user.ultimoAcceso = new Date().toISOString();
      await saveUsuarios();
      registrarAuditoria('Recuperación de contraseña', user.correo);
      SESSION = { usuario:user.nombre, rol:user.rol, correo:user.correo, authenticated:true };
      loginState = { step:'login', error:'', ok:'', pendingUser:null };
      document.getElementById('loginScreen').style.display = 'none';
      document.querySelector('.app').style.display = 'grid';
      currentView = 'dashboard';
      renderAll();
      iniciarControlDeInactividad();
    };
  }
}

/* =========================================================================
   INIT
   ========================================================================= */
(async function init(){
  try{
    await loadAll();
    document.querySelector('.app').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    loginState = { step: DB.usuarios.length===0 ? 'setup-admin' : 'login', error:'', ok:'', pendingUser:null };
    renderLogin();
  }catch(err){
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginScreen').innerHTML = `
      <div class="login-card">
        <div class="login-brand"><div class="brand-mark">CC</div><div><div>Cuentas Críticas</div><div>Gestión de Cobros — Dirección</div></div></div>
        <h2>No se pudo iniciar la aplicación</h2>
        <div class="login-error">Ocurrió un error al cargar los datos: ${err.message||err}</div>
        <p class="sub">Intente recargar esta página. Si el problema persiste, avísele al equipo que preparó esta herramienta.</p>
      </div>`;
  }
})();
</script>
